
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --a:#5B5FC7;--al:#EEEEFF;--am:#A3A6E8;
  --bp:#F0F0F7;--bm:#F7F7FC;
  --tp:#1A1A3E;--ts:#6B6B8A;--tt:#A0A0BE;
  --br:#E4E4F0;--brs:#C5C5E0;
  --su:#4CAF82;--sub:#E8F7EF;
  --wa:#F5A623;--wab:#FFF4E0;
  --da:#E85757;--dab:#FDEAEA;
  --ag:#1A1A3E;--agb:#F5A623;
}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bp);}

.controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.tab-group{display:flex;gap:3px;padding:3px;background:#fff;border:1px solid var(--br);border-radius:10px;}
.tt{height:30px;padding:0 14px;border-radius:7px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--tt);}
.tt.ts{background:var(--bp);color:var(--tp);}
.tt.tp{background:var(--a);color:#fff;}
.tt.tag{background:var(--ag);color:var(--agb);}
.vt{height:30px;padding:0 13px;border-radius:7px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--tt);}
.vt.on{background:var(--a);color:#fff;}

.shell{display:flex;height:720px;background:var(--bp);border-radius:14px;overflow:hidden;border:1px solid var(--br);}

/* SIDEBAR */
.sidebar{width:215px;min-width:215px;background:#fff;border-right:1px solid var(--br);display:flex;flex-direction:column;flex-shrink:0;}
.sidebar.dark{background:var(--ag);border-color:#2D2D5E;}
.slogo{height:56px;display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0;}
.sidebar .slogo{border-bottom:1px solid var(--br);}
.sidebar.dark .slogo{border-bottom:1px solid #2D2D5E;}
.sli{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.slt{font-size:14px;font-weight:700;}
.sidebar .slt{color:var(--tp);}
.sidebar.dark .slt{color:#fff;}
.snav{padding:12px 8px 6px;}
.snl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:0 8px;margin-bottom:4px;color:var(--tt);}
.sidebar.dark .snl{color:rgba(255,255,255,.3);}
.sni{display:flex;align-items:center;gap:8px;height:38px;padding:0 10px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--ts);margin-bottom:1px;}
.sidebar.dark .sni{color:rgba(255,255,255,.45);}
.sni.act{background:var(--al);color:var(--a);}
.sidebar.dark .sni.act{background:rgba(245,166,35,.15);color:var(--agb);}
.sni svg{width:15px;height:15px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.sbot{margin-top:auto;padding:10px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.sidebar .sbot{border-top:1px solid var(--br);}
.sidebar.dark .sbot{border-top:1px solid #2D2D5E;}
.sav{width:28px;height:28px;border-radius:9999px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.spb{font-size:10px;font-weight:700;padding:1px 7px;border-radius:9999px;}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.tb{height:56px;background:#fff;border-bottom:1px solid var(--br);display:flex;align-items:center;padding:0 20px;gap:8px;flex-shrink:0;}
.tb-title{font-size:16px;font-weight:600;color:var(--tp);flex:1;}
.scroll{flex:1;overflow-y:auto;padding:18px 20px;background:var(--bm);}

.btnp{height:30px;padding:0 12px;border-radius:8px;color:#fff;font-size:12px;font-weight:600;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.btnp.ind{background:var(--a);}
.btnp.drk{background:var(--ag);}
.btns{height:30px;padding:0 10px;border-radius:8px;background:#fff;color:var(--tp);font-size:12px;font-weight:500;border:1px solid var(--br);cursor:pointer;display:inline-flex;align-items:center;gap:5px;}
.btng{height:26px;padding:0 8px;border-radius:6px;background:transparent;font-size:11px;font-weight:500;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:3px;}
.btng.p{color:var(--a);}
.btng.p:hover{background:var(--al);}
.btng.ag{color:#9A6600;}
.btng.ag:hover{background:rgba(245,166,35,.08);}
.btn-up{height:24px;padding:0 11px;border-radius:9999px;font-size:11px;font-weight:600;border:none;cursor:pointer;white-space:nowrap;}
.btn-up.p{background:var(--a);color:#fff;}
.btn-up.a{background:var(--ag);color:var(--agb);}

.bd{font-size:10px;font-weight:600;padding:2px 7px;border-radius:9999px;white-space:nowrap;}
.bd-new{background:var(--al);color:var(--a);}
.bd-hi{background:var(--sub);color:var(--su);}
.bd-med{background:var(--wab);color:var(--wa);}
.bd-ag{background:rgba(245,166,35,.15);color:#9A6600;}
.bd-eu{background:#EFF6FF;color:#1D4ED8;}

.ub{border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.ub.ind{background:var(--al);border:1px solid var(--am);}
.ub.drk{background:var(--ag);border:1px solid #3D3D7E;}
.ub-ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.ub.ind .ub-ic{background:#fff;}
.ub.drk .ub-ic{background:rgba(245,166,35,.15);}
.ub-body{flex:1;}
.ub-ttl{font-size:12px;font-weight:700;}
.ub.ind .ub-ttl{color:var(--a);}
.ub.drk .ub-ttl{color:#fff;}
.ub-sub{font-size:11px;margin-top:1px;}
.ub.ind .ub-sub{color:var(--ts);}
.ub.drk .ub-sub{color:rgba(255,255,255,.55);}
.ub-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;}
.ut-i{font-size:10px;font-weight:600;padding:2px 6px;border-radius:9999px;background:var(--al);color:var(--a);}
.ut-d{font-size:10px;font-weight:600;padding:2px 6px;border-radius:9999px;background:rgba(245,166,35,.15);color:#9A6600;}

.sg{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:14px;}
.sc{background:#fff;border:1px solid var(--br);border-radius:10px;padding:11px 13px;}
.sc-l{font-size:10px;font-weight:600;color:var(--ts);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;}
.sc-v{font-size:19px;font-weight:700;color:var(--tp);}
.sc-s{font-size:10px;color:var(--tt);margin-top:1px;}

.ws-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.wst{height:28px;padding:0 12px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:5px;}
.wst.on{background:var(--ag);color:#fff;}
.wst.off{background:#fff;color:var(--ts);border:1px solid var(--br);}
.wst.add{background:transparent;color:var(--ts);border:1px dashed var(--brs);}
.wct{font-size:10px;border-radius:9999px;padding:1px 5px;}
.wct-on{background:rgba(255,255,255,.2);color:#fff;}
.wct-off{background:var(--bm);color:var(--tt);}

.gen-panel{background:#fff;border:1px solid var(--br);border-radius:12px;padding:12px 15px;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.fsel{height:28px;padding:0 8px;border-radius:7px;border:1px solid var(--br);font-size:11px;color:var(--ts);background:#fff;font-family:inherit;cursor:pointer;outline:none;}

.frow{display:flex;align-items:center;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.fc{height:26px;padding:0 10px;border-radius:9999px;font-size:11px;font-weight:600;cursor:pointer;border:none;}
.fc.on{background:var(--a);color:#fff;}
.fc.on-ag{background:var(--ag);color:#fff;}
.fc.off{background:#fff;color:var(--ts);border:1px solid var(--br);}

/* BRIEF CARDS */
.brief-list{display:flex;flex-direction:column;gap:10px;}
.brc{background:#fff;border:1px solid var(--br);border-radius:13px;overflow:hidden;cursor:pointer;transition:box-shadow .15s;}
.brc:hover{box-shadow:0 4px 16px rgba(91,95,199,.10);}
.brc.feat-p{border-left:3px solid var(--a);}
.brc.feat-ag{border-left:3px solid var(--agb);}
.brc-strip{display:flex;align-items:center;gap:8px;padding:10px 14px 8px;border-bottom:1px solid var(--br);}
.brc-emoji{font-size:16px;flex-shrink:0;}
.brc-niche{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;}
.brc-niche.p{color:var(--a);}
.brc-niche.ag{color:#9A6600;}
.brc-strip-right{margin-left:auto;display:flex;align-items:center;gap:5px;}
.brc-doc{padding:12px 14px;}
.brc-headline{font-size:15px;font-weight:700;color:var(--tp);line-height:1.35;margin-bottom:8px;}
.brc-lede{font-size:12px;color:var(--ts);line-height:1.7;margin-bottom:10px;}
.brc-bullets{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
.brc-bullet{display:flex;align-items:baseline;gap:8px;font-size:12px;color:var(--tp);line-height:1.5;}
.brc-bullet-dot{width:5px;height:5px;border-radius:9999px;flex-shrink:0;margin-top:6px;}
.brc-bullet-dot.hi{background:var(--su);}
.brc-bullet-dot.med{background:var(--wa);}
.brc-sowhat{background:var(--bm);border:1px solid var(--br);border-radius:8px;padding:8px 11px;font-size:12px;color:var(--tp);line-height:1.55;}
.brc-sowhat strong{color:var(--a);}
.brc-sowhat.ag strong{color:#9A6600;}
.brc-foot{display:flex;align-items:center;gap:5px;padding:8px 12px;border-top:1px solid var(--br);background:var(--bm);}
.brc-date{font-size:10px;color:var(--tt);}

/* LOCKED */
.lock-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:50px 20px;text-align:center;}
.lock-icon-bg{width:56px;height:56px;border-radius:16px;background:var(--dab);display:flex;align-items:center;justify-content:center;}
.lock-icon-bg svg{width:24px;height:24px;stroke:var(--da);fill:none;stroke-width:1.5;stroke-linecap:round;}
.lock-feats{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:400px;width:100%;}
.lf{background:#fff;border:1px solid var(--br);border-radius:9px;padding:10px 12px;display:flex;gap:8px;align-items:flex-start;text-align:left;}
.lf svg{width:13px;height:13px;stroke:var(--a);fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0;margin-top:2px;}
.lf-ttl{font-size:12px;font-weight:600;color:var(--tp);}
.lf-sub{font-size:11px;color:var(--tt);margin-top:1px;}

/* DETAIL VIEW */
.pg{display:none;flex-direction:column;overflow:hidden;flex:1;}
.pg.on{display:flex;}
.bc{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tt);margin-bottom:12px;}
.bc .lnk{color:var(--a);cursor:pointer;font-weight:600;}
.bc svg{width:10px;height:10px;stroke:var(--tt);fill:none;stroke-width:1.5;stroke-linecap:round;}

.brief-1pager{background:#fff;border:1px solid var(--br);border-radius:14px;overflow:hidden;margin-bottom:12px;}
.doc-header{padding:22px 24px 18px;border-bottom:1px solid var(--br);}
.doc-from{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--tt);margin-bottom:6px;}
.doc-headline{font-size:20px;font-weight:800;color:var(--tp);line-height:1.25;margin-bottom:10px;letter-spacing:-.3px;}
.doc-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.doc-pill{font-size:10px;font-weight:600;padding:3px 9px;border-radius:9999px;}
.doc-pill-a{background:var(--al);color:var(--a);}
.doc-pill-s{background:var(--sub);color:var(--su);}
.doc-pill-d{background:var(--bp);color:var(--ts);border:1px solid var(--br);}
.doc-pill-ag{background:rgba(245,166,35,.15);color:#9A6600;}
.doc-lede{font-size:14px;color:var(--tp);line-height:1.8;font-weight:400;}
.doc-lede strong{font-weight:700;}
.doc-div{height:1px;background:var(--br);margin:0 24px;}
.doc-section{padding:16px 24px;}
.doc-section-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--tt);margin-bottom:12px;}
.signal-bullets{display:flex;flex-direction:column;gap:8px;}
.sb2{display:flex;gap:10px;align-items:flex-start;}
.sb2-num{width:18px;height:18px;border-radius:5px;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.sb2-num.hi{background:var(--sub);color:var(--su);}
.sb2-num.hi-ag{background:rgba(245,166,35,.2);color:#9A6600;}
.sb2-num.med{background:var(--wab);color:var(--wa);}
.sb2-text{font-size:13px;color:var(--tp);line-height:1.55;font-weight:500;flex:1;}
.sb2-source{font-size:10px;color:var(--tt);margin-top:2px;}
.so-what-box{background:var(--bm);border-left:3px solid var(--a);border-radius:0 9px 9px 0;padding:12px 14px;margin:0 24px;}
.so-what-box.ag{border-color:var(--agb);}
.so-what-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;}
.so-what-lbl.p{color:var(--a);}
.so-what-lbl.ag{color:#9A6600;}
.so-what-text{font-size:13px;color:var(--tp);line-height:1.65;}
.one-action{padding:14px 24px;border-top:1px solid var(--br);background:var(--bm);display:flex;align-items:center;gap:10px;}
.oa-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--tt);flex-shrink:0;}
.oa-text{font-size:12px;font-weight:600;color:var(--tp);flex:1;}
.doc-footer{padding:12px 24px;border-top:1px solid var(--br);display:flex;align-items:center;gap:10px;}
.doc-footer-brand{font-size:11px;color:var(--tt);flex:1;}
.doc-footer-brand strong{color:var(--ts);}

/* SEND ROW */
.send-row{background:#fff;border:1px solid var(--br);border-radius:13px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.send-lbl{font-size:13px;font-weight:600;color:var(--tp);}
.send-sub{font-size:11px;color:var(--tt);margin-top:2px;}

/* ── REPURPOSE ROW — Newsletter + LinkedIn only ── */
.repurpose-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.rp-btn{border:1px solid var(--br);background:#fff;border-radius:12px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .15s;text-align:left;}
.rp-btn:hover{box-shadow:0 4px 16px rgba(91,95,199,.10);}
.rp-btn:not(.lk):hover{border-color:var(--a);background:var(--al);}
.rp-btn.ag-s:not(.lk):hover{border-color:var(--agb);background:rgba(245,166,35,.07);}
.rp-btn.lk{opacity:.42;cursor:not-allowed;}
.rp-ic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.rp-ic.ind{background:var(--al);}
.rp-ic.gold{background:rgba(245,166,35,.12);}
.rp-ic svg{width:16px;height:16px;stroke:var(--a);fill:none;stroke-width:1.5;stroke-linecap:round;transition:all .15s;}
.rp-ic.gold svg{stroke:var(--agb);}
.rp-btn:not(.lk):hover .rp-ic{background:var(--a);}
.rp-btn:not(.lk):hover .rp-ic svg{stroke:#fff;}
.rp-btn.ag-s:not(.lk):hover .rp-ic{background:var(--ag);}
.rp-body{flex:1;min-width:0;}
.rp-lbl{font-size:13px;font-weight:700;color:var(--tp);margin-bottom:2px;}
.rp-sub{font-size:11px;color:var(--ts);}
.rp-meta{font-size:10px;color:var(--tt);margin-top:3px;}
.rp-arrow{font-size:16px;color:var(--tt);flex-shrink:0;transition:all .15s;}
.rp-btn:not(.lk):hover .rp-arrow{color:var(--a);transform:translateX(2px);}
.rp-btn.ag-s:not(.lk):hover .rp-arrow{color:#9A6600;}
.lk-badge{width:22px;height:22px;background:var(--dab);border-radius:9999px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.lk-badge svg{width:10px;height:10px;stroke:var(--da);fill:none;stroke-width:2;stroke-linecap:round;}
</style>

<!-- CONTROLS -->
<div class="controls">
  <div class="tab-group">
    <button class="tt ts" onclick="setTier('s')">Starter €49</button>
    <button class="tt" id="tt-p" onclick="setTier('p')">Pro €99</button>
    <button class="tt" id="tt-ag" onclick="setTier('ag')">Agency €249</button>
  </div>
  <div class="tab-group">
    <button class="vt on" id="vt-list" onclick="showPage('list')">📋 Brief list</button>
    <button class="vt" id="vt-detail" onclick="showPage('detail')">📄 Brief (1-pager)</button>
  </div>
</div>

<div class="shell">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sb">
    <div class="slogo">
      <div class="sli" id="sb-li" style="background:var(--a);"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" style="width:14px;height:14px;"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg></div>
      <span class="slt" id="sb-lt">PulseLoop</span>
    </div>
    <div class="snav">
      <div class="snl">Workspace</div>
      <div class="sni"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Overview</div>
      <div class="sni"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>Niches</div>
      <div class="sni"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Trend Reports</div>

      <div class="sni act" id="ni-sb"><svg viewBox="0 0 24 24"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>Signal Briefs</div>
      <div class="sni" id="ni-nl"><svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><span id="nl-txt">Newsletters</span></div>
      <div class="sni"><svg viewBox="0 0 24 24"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>LinkedIn Posts</div>
    </div>
    <div class="snav" style="padding-top:4px;">
      <div class="snl">Settings</div>
      <div class="sni"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>Brand Voice</div>
      <div class="sni"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2"/></svg>Sources</div>
    </div>
    <div class="sbot">
      <div class="sav" id="sb-av" style="background:var(--al);color:var(--a);">VB</div>
      <div style="flex:1;min-width:0;"><div style="font-size:12px;font-weight:500;" id="sb-un">Vaibhav</div><span class="spb" id="sb-pb" style="background:var(--al);color:var(--a);">PRO</span></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- LIST PAGE -->
    <div class="pg on" id="pg-list">
      <div class="tb">
        <div class="tb-title">Signal Briefs</div>
