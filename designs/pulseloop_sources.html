
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --a:#5B5FC7;--al:#EEEEFF;--am:#A3A6E8;
  --bp:#F0F0F7;--bm:#F7F7FC;
  --tp:#1A1A3E;--ts:#6B6B8A;--tt:#A0A0BE;
  --br:#E4E4F0;--brs:#C5C5E0;
  --su:#4CAF82;--sub:#E8F7EF;
  --wa:#F5A623;--wab:#FFF4E0;
  --da:#E85757;--dab:#FDEAEA;
  --ag:#1A1A3E;--agb:#F5A623;
}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bp);}

.tier-row{display:flex;gap:3px;padding:3px;background:#fff;border:1px solid var(--br);border-radius:10px;width:fit-content;margin-bottom:12px;}
.tt{height:30px;padding:0 14px;border-radius:7px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--tt);}
.tt.ts{background:var(--bp);color:var(--tp);}
.tt.tp{background:var(--a);color:#fff;}
.tt.tag{background:var(--ag);color:var(--agb);}

.shell{display:flex;height:720px;background:var(--bp);border-radius:14px;overflow:hidden;border:1px solid var(--br);position:relative;}

/* SIDEBAR */
.sidebar{width:215px;min-width:215px;background:#fff;border-right:1px solid var(--br);display:flex;flex-direction:column;flex-shrink:0;}
.sidebar.dark{background:var(--ag);border-color:#2D2D5E;}
.slogo{height:56px;display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0;}
.sidebar .slogo{border-bottom:1px solid var(--br);}
.sidebar.dark .slogo{border-bottom:1px solid #2D2D5E;}
.sli{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.slt{font-size:14px;font-weight:700;}
.sidebar .slt{color:var(--tp);}
.sidebar.dark .slt{color:#fff;}
.snav{padding:12px 8px 6px;}
.snl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:0 8px;margin-bottom:4px;color:var(--tt);}
.sidebar.dark .snl{color:rgba(255,255,255,.3);}
.sni{display:flex;align-items:center;gap:8px;height:38px;padding:0 10px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--ts);margin-bottom:1px;}
.sidebar.dark .sni{color:rgba(255,255,255,.45);}
.sni.act{background:var(--al);color:var(--a);}
.sidebar.dark .sni.act{background:rgba(245,166,35,.15);color:var(--agb);}
.sni svg{width:15px;height:15px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.sbot{margin-top:auto;padding:10px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.sidebar .sbot{border-top:1px solid var(--br);}
.sidebar.dark .sbot{border-top:1px solid #2D2D5E;}
.sav{width:28px;height:28px;border-radius:9999px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.spb{font-size:10px;font-weight:700;padding:1px 7px;border-radius:9999px;}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.tb{height:56px;background:#fff;border-bottom:1px solid var(--br);display:flex;align-items:center;padding:0 20px;gap:8px;flex-shrink:0;}
.tb-title{font-size:16px;font-weight:600;color:var(--tp);flex:1;}
.scroll{flex:1;overflow-y:auto;padding:18px 20px;background:var(--bm);}

.btnp{height:32px;padding:0 14px;border-radius:9px;color:#fff;font-size:12px;font-weight:600;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
.btnp.drk{background:var(--ag);}
.btnp.ind{background:var(--a);}
.btns{height:32px;padding:0 12px;border-radius:9px;background:#fff;color:var(--tp);font-size:12px;font-weight:500;border:1px solid var(--br);cursor:pointer;display:inline-flex;align-items:center;gap:5px;}
.btn-up.a{height:36px;padding:0 24px;border-radius:10px;font-size:13px;background:var(--ag);color:var(--agb);border:none;cursor:pointer;font-weight:600;}

/* PRIVACY BAR */
.privacy-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:11px;margin-bottom:16px;border:1px solid rgba(245,166,35,.4);background:rgba(245,166,35,.07);}
.privacy-icon{width:28px;height:28px;border-radius:7px;background:rgba(245,166,35,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;}
.privacy-text{font-size:12px;color:var(--ts);flex:1;line-height:1.5;}
.privacy-text strong{color:var(--tp);}
.privacy-link{font-size:11px;font-weight:600;color:#9A6600;cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;text-decoration:underline;text-underline-offset:2px;background:none;border:none;font-family:inherit;}
.privacy-link:hover{color:#7A4E00;}

/* WS TABS */
.ws-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;}
.wst{height:28px;padding:0 12px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:5px;}
.wst.on{background:var(--ag);color:#fff;}
.wst.off{background:#fff;color:var(--ts);border:1px solid var(--br);}
.wst.add{background:transparent;color:var(--ts);border:1px dashed var(--brs);}

/* SEC LABEL */
.sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--tt);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--br);}

/* SOURCES GRID */
.sources-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.src-card{background:#fff;border:1px solid var(--br);border-radius:11px;padding:11px 13px;display:flex;align-items:center;gap:10px;}
.src-emoji{font-size:17px;flex-shrink:0;}
.src-name{font-size:12px;font-weight:600;color:var(--tp);}
.src-tier{font-size:10px;color:var(--tt);margin-top:1px;}
.tog{width:32px;height:18px;border-radius:9999px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;margin-left:auto;}
.tog.on{background:var(--su);}
.tog.off{background:var(--brs);}
.tog-knob{width:12px;height:12px;border-radius:9999px;background:#fff;position:absolute;top:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.tog.on .tog-knob{left:17px;}
.tog.off .tog-knob{left:3px;}

/* ADD ZONE */
.add-source-zone{border:2px dashed var(--brs);border-radius:13px;padding:28px 20px;display:flex;flex-direction:column;align-items:center;gap:12px;background:#fff;cursor:pointer;transition:all .2s;margin-bottom:14px;}
.add-source-zone:hover{border-color:var(--agb);background:rgba(245,166,35,.04);}
.add-source-zone:hover .asz-ic{background:var(--ag);}
.add-source-zone:hover .asz-ic svg{stroke:#fff;}
.add-source-zone:hover .asz-lbl{color:#9A6600;}
.asz-ic{width:44px;height:44px;border-radius:12px;background:var(--bm);display:flex;align-items:center;justify-content:center;transition:all .2s;}
.asz-ic svg{width:20px;height:20px;stroke:var(--ts);fill:none;stroke-width:1.5;stroke-linecap:round;transition:all .2s;}
.asz-lbl{font-size:14px;font-weight:700;color:var(--ts);transition:all .2s;}
.asz-sub{font-size:12px;color:var(--tt);text-align:center;line-height:1.6;}
.file-types{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;}
.ft{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:8px;border:1px solid var(--br);background:var(--bm);font-size:11px;font-weight:600;color:var(--ts);}
.ft-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.ft-dot.pdf{background:#E85757;}
.ft-dot.xls{background:#4CAF82;}
.ft-dot.doc{background:#2563EB;}
.ft-dot.txt{background:var(--tt);}

/* UPLOADED FILES */
.uploaded-list{display:flex;flex-direction:column;gap:7px;margin-bottom:14px;}
.ufile{background:#fff;border:1px solid var(--br);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;}
.ufile-ic{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.ufile-name{font-size:12px;font-weight:600;color:var(--tp);}
.ufile-meta{font-size:10px;color:var(--tt);margin-top:1px;}
.status-pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:9999px;margin-left:auto;}
.sp-proc{background:var(--sub);color:var(--su);}
.sp-used{background:var(--al);color:var(--a);}

/* LOCK */
.lock-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:60px 20px;text-align:center;}
.lock-feats{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:400px;width:100%;}
.lf{background:#fff;border:1px solid var(--br);border-radius:9px;padding:10px 12px;display:flex;gap:8px;align-items:flex-start;text-align:left;}
.lf svg{width:13px;height:13px;stroke:var(--a);fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0;margin-top:2px;}
.lf-ttl{font-size:12px;font-weight:600;color:var(--tp);}
.lf-sub{font-size:11px;color:var(--tt);margin-top:1px;}

/* ── MODAL OVERLAY ── */
.modal-overlay{position:absolute;inset:0;background:rgba(15,15,30,.45);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px);animation:fadeIn .15s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{background:#fff;border-radius:16px;width:440px;max-width:calc(100% - 40px);box-shadow:0 20px 60px rgba(15,15,30,.25);animation:popIn .18s ease;overflow:hidden;}
@keyframes popIn{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:scale(1);}}
.modal-hd{padding:18px 20px 14px;border-bottom:1px solid var(--br);display:flex;align-items:flex-start;gap:10px;}
.modal-hd-ic{width:34px;height:34px;border-radius:9px;background:rgba(245,166,35,.15);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.modal-hd-title{font-size:15px;font-weight:700;color:var(--tp);}
.modal-hd-sub{font-size:11px;color:var(--tt);margin-top:2px;}
.modal-close{margin-left:auto;width:28px;height:28px;border-radius:7px;background:var(--bm);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--ts);flex-shrink:0;transition:background .15s;}
.modal-close:hover{background:var(--br);}
.modal-body{padding:18px 20px;}
.modal-text{font-size:13px;color:var(--tp);line-height:1.85;}
.modal-text strong{font-weight:700;color:var(--tp);}
.modal-footer{padding:14px 20px;border-top:1px solid var(--br);background:var(--bm);display:flex;align-items:center;gap:8px;}
.modal-footer-txt{font-size:11px;color:var(--tt);flex:1;display:flex;align-items:center;gap:5px;}
.modal-footer-txt svg{width:12px;height:12px;stroke:var(--su);fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0;}
</style>

<script>
var T = 'p';
var TOGGLES = {};
var UPLOADED = [
  { icon:'📄', name:'Acme Corp AI Readiness Report.pdf', size:'2.4 MB', type:'PDF', status:'processed', usedIn:'Trend Report W12' },
  { icon:'📊', name:'Q1 2026 Budget Allocation.xlsx', size:'890 KB', type:'Excel', status:'used', usedIn:'Signal Brief W11' },

var BUILTIN_SOURCES = [
  { emoji:'💼', name:'LinkedIn',         tier:'Tier 1 · Core',       on:true  },
  { emoji:'🔶', name:'Hacker News',      tier:'Tier 1 · Core',       on:true  },
  { emoji:'🟠', name:'Reddit',           tier:'Tier 1 · Core',       on:true  },
  { emoji:'📰', name:'Google News',      tier:'Tier 1 · Core',       on:true  },
  { emoji:'𝕏',  name:'X / Twitter',     tier:'Tier 1 · Core',       on:true  },
  { emoji:'🇫🇷', name:'Malt.fr',          tier:'Tier 2 · EU Edge',    on:true  },
  { emoji:'📡', name:'FrenchWeb',        tier:'Tier 2 · EU Edge',    on:true  },
  { emoji:'🎯', name:'Maddyness',        tier:'Tier 2 · EU Edge',    on:true  },
  { emoji:'🚀', name:'ProductHunt',      tier:'Tier 2 · EU Edge',    on:true  },
  { emoji:'💼', name:'Welcome to Jungle',tier:'Tier 2 · EU Edge',    on:false },

  { emoji:'📝', name:'Substack',         tier:'Tier 2 · EU Edge',    on:true  },
  { emoji:'🔮', name:'Polymarket',       tier:'Tier 3 · Deep Intel', on:false },
  { emoji:'💻', name:'GitHub Trending',  tier:'Tier 3 · Deep Intel', on:true  },
  { emoji:'🎬', name:'YouTube',          tier:'Tier 3 · Deep Intel', on:false },
  { emoji:'🏛️', name:'EU Parliament',    tier:'Tier 3 · Deep Intel', on:true  },
  { emoji:'🔒', name:'CNIL',             tier:'Tier 3 · Deep Intel', on:true  },
  { emoji:'🦋', name:'Bluesky',          tier:'Tier 3 · Deep Intel', on:false },
];
BUILTIN_SOURCES.forEach(function(s,i){ TOGGLES[i]=s.on; });

/* ── MODAL ── */
function openPrivacyModal() {
  var html = '<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">'
    +'<div class="modal" onclick="event.stopPropagation()">'
    +'<div class="modal-hd">'
    +'<div class="modal-hd-ic">🔒</div>'
    +'<div><div class="modal-hd-title">How your files are handled</div><div class="modal-hd-sub">Privacy details — PulseLoop data processing</div></div>'
    +'<button class="modal-close" onclick="closeModal()">×</button>'
    +'</div>'
    +'<div class="modal-body">'
    +'<div class="modal-text">'
    +'When you upload a document, PulseLoop loads it into <strong>temporary server memory</strong>, extracts the relevant signals, generates your report, then <strong>immediately deletes the file</strong>. Nothing is written to our database — ever. The report is saved; your source document is not.'
    +'<br><br>'
    +'Our infrastructure runs on <strong>Supabase EU Frankfurt servers</strong>, built for GDPR compliance. Under <strong>GDPR Article 17</strong>, you can also request deletion of any data we hold about you at any time.'
    +'</div>'
    +'</div>'
    +'<div class="modal-footer">'
    +'<div class="modal-footer-txt"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Supabase EU-West (Frankfurt) · GDPR compliant · Article 17 deletion on request</div>'
    +'<button class="btns" style="height:28px;font-size:11px;" onclick="closeModal()">Close</button>'
    +'</div>'
    +'</div>'
    +'</div>';
  document.getElementById('modal-portal').innerHTML = html;
}

function closeModal() {
  document.getElementById('modal-portal').innerHTML = '';
}

function handleOverlayClick(e) {
  if (e.target.id === 'modal-overlay') closeModal();
}

/* ── TIER ── */
function setTier(t) {
  T = t;
  var isAg = t==='ag';
  document.querySelectorAll('.tt').forEach(function(b){b.className='tt';});
  if(t==='s') document.querySelectorAll('.tt')[0].className='tt ts';
  if(t==='p') document.querySelectorAll('.tt')[1].className='tt tp';
  if(t==='ag') document.querySelectorAll('.tt')[2].className='tt tag';

  var sb=document.getElementById('sb'), sbLi=document.getElementById('sb-li');
  var sbAv=document.getElementById('sb-av'), topAv=document.getElementById('top-av');
  var sbPb=document.getElementById('sb-pb'), sbLt=document.getElementById('sb-lt'), sbUn=document.getElementById('sb-un');
  var niSrc=document.getElementById('ni-src');

  if (isAg) {
    sb.className='sidebar dark'; sbLi.style.background='var(--agb)';
    sbAv.style.background='rgba(245,166,35,.2)'; sbAv.style.color='var(--agb)';
    topAv.style.background='rgba(245,166,35,.2)'; topAv.style.color='var(--agb)';
    sbPb.style.cssText='background:var(--ag);color:var(--agb);'; sbPb.textContent='AGENCY';
    sbLt.style.color='#fff'; sbUn.style.color='#fff';
    niSrc.style.background='rgba(245,166,35,.15)'; niSrc.style.color='var(--agb)';
    document.getElementById('tb-action').innerHTML='<button class="btnp drk" onclick="triggerUpload()"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" style="width:11px;height:11px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add personal source</button>';
  } else {
    sb.className='sidebar'; sbLi.style.background='var(--a)';
    sbAv.style.background='var(--al)'; sbAv.style.color='var(--a)';
    topAv.style.background='var(--al)'; topAv.style.color='var(--a)';
    if(t==='p'){sbPb.style.cssText='background:var(--al);color:var(--a);';sbPb.textContent='PRO';}
    else{sbPb.style.cssText='background:var(--bp);color:var(--ts);border:1px solid var(--br);';sbPb.textContent='STARTER';}
    sbLt.style.color='var(--tp)'; sbUn.style.color='var(--tp)';
    niSrc.style.background=''; niSrc.style.color='';
    document.getElementById('tb-action').innerHTML='';
  }
  render();
}

function triggerUpload() {
  if (UPLOADED.length < 6) {
    UPLOADED.unshift({ icon:'📝', name:'Client Strategy Deck Q2.docx', size:'1.1 MB', type:'Word', status:'processed', usedIn:'—' });
    render();
  }
}

function toggleSource(i) {
  TOGGLES[i] = !TOGGLES[i];
  var tog = document.getElementById('tog-'+i);
  if (!tog) return;
  tog.className = 'tog '+(TOGGLES[i]?'on':'off');
  tog.innerHTML = '<div class="tog-knob"></div>';
}

function render() {
  var isAg = T==='ag';
  var body = '';

  /* ── LOCKED ── */
  if (!isAg) {
    body += '<div class="lock-wrap">'
      +'<div style="width:60px;height:60px;border-radius:18px;background:var(--dab);display:flex;align-items:center;justify-content:center;"><svg viewBox="0 0 24 24" style="width:26px;height:26px;stroke:var(--da);fill:none;stroke-width:1.5;stroke-linecap:round;"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>'
      +'<div style="font-size:18px;font-weight:700;color:var(--tp);">Personal sources are an Agency feature</div>'
      +'<div style="font-size:13px;color:var(--ts);max-width:380px;line-height:1.65;">Upload your own PDFs, Excel files, Word documents and text files to weave private data into your reports. Every upload is processed in memory and deleted instantly — zero trace on our servers.</div>'
      +'<div class="lock-feats">'
      +'<div class="lf"><svg viewBox="0 0 24 24"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg><div><div class="lf-ttl">PDF, Excel, Word, TXT</div><div class="lf-sub">Upload any internal document</div></div></div>'
      +'<div class="lf"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><div><div class="lf-ttl">Zero data retention</div><div class="lf-sub">Processed in memory, deleted instantly</div></div></div>'
      +'<div class="lf"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><div><div class="lf-ttl">Woven into reports</div><div class="lf-sub">Private signals alongside 18 EU sources</div></div></div>'
      +'<div class="lf"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><div><div class="lf-ttl">Per workspace</div><div class="lf-sub">Each client workspace is fully isolated</div></div></div>'
      +'</div>'
      +'<button class="btn-up a">Upgrade to Agency — from €249/mo →</button>'
      +'</div>';
    document.getElementById('page-body').innerHTML = body; return;
  }

  /* ── AGENCY ── */
  body += '<div style="font-size:10px;font-weight:700;color:var(--tt);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;">Workspace</div>'
    +'<div class="ws-tabs"><button class="wst on">🏢 Acme Corp</button><button class="wst off">🚀 Mistral AI</button><button class="wst off">📊 Pennylane</button><button class="wst add">+ Add workspace</button></div>';

  /* PRIVACY BAR */
  body += '<div class="privacy-bar">'
    +'<div class="privacy-icon">🔒</div>'
    +'<div class="privacy-text"><strong>Your uploaded files are never stored.</strong> Processed in memory, deleted instantly after your report generates. Zero trace on our servers.</div>'
    +'<button class="privacy-link" onclick="openPrivacyModal()">🔒 View Privacy Details</button>'
    +'</div>';

  /* PERSONAL SOURCES */
  body += '<div class="sec-lbl">Personal sources — Acme Corp</div>';

  if (UPLOADED.length > 0) {
    body += '<div class="uploaded-list">';
    UPLOADED.forEach(function(f) {
      var bg = f.type==='PDF'?'var(--dab)':f.type==='Excel'?'var(--sub)':f.type==='Word'?'#DBEAFE':'var(--bm)';
      body += '<div class="ufile">'
        +'<div class="ufile-ic" style="background:'+bg+';">'+f.icon+'</div>'
        +'<div style="flex:1;min-width:0;"><div class="ufile-name">'+f.name+'</div><div class="ufile-meta">'+f.type+' · '+f.size+(f.usedIn!=='—'?' · Used in: '+f.usedIn:'')+'</div></div>'
        +'<span class="status-pill '+(f.status==='processed'?'sp-proc':'sp-used')+'">'+(f.status==='processed'?'✓ Processed':'Used')+'</span>'
        +'<button style="height:24px;padding:0 8px;border-radius:6px;background:transparent;border:none;font-size:11px;color:var(--da);cursor:pointer;font-weight:500;">Remove</button>'
        +'</div>';
    });
    body += '</div>';
  }

  body += '<div class="add-source-zone" onclick="triggerUpload()">'
    +'<div class="asz-ic"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>'
    +'<div class="asz-lbl">Add a personal source</div>'
    +'<div class="asz-sub">Upload internal documents to weave your private data into reports.<br>Processed in memory · deleted instantly · zero trace.</div>'
    +'<div class="file-types">'
    +'<div class="ft"><div class="ft-dot pdf"></div>PDF</div>'
    +'<div class="ft"><div class="ft-dot xls"></div>Excel</div>'
    +'<div class="ft"><div class="ft-dot doc"></div>Word</div>'
    +'<div class="ft"><div class="ft-dot txt"></div>TXT</div>'
    +'</div>'
    +'</div>';

  /* BUILT-IN SOURCES */
  body += '<div class="sec-lbl" style="margin-top:4px;">Built-in EU sources (18)</div>';
  ['Tier 1 · Core','Tier 2 · EU Edge','Tier 3 · Deep Intel'].forEach(function(tier) {
    body += '<div style="font-size:10px;font-weight:600;color:var(--tt);margin-bottom:7px;margin-top:4px;">'+tier+'</div><div class="sources-grid">';
    BUILTIN_SOURCES.forEach(function(s,i){
      if (s.tier!==tier) return;
      body += '<div class="src-card"><span class="src-emoji">'+s.emoji+'</span><div style="flex:1;min-width:0;"><div class="src-name">'+s.name+'</div><div class="src-tier">'+s.tier+'</div></div>'
        +'<button class="tog '+(TOGGLES[i]?'on':'off')+'" id="tog-'+i+'" onclick="toggleSource('+i+')"><div class="tog-knob"></div></button>'
        +'</div>';
    });
    body += '</div>';
  });

  document.getElementById('page-body').innerHTML = body;
  document.querySelectorAll('.wst').forEach(function(b){
    b.addEventListener('click',function(){
      if(this.classList.contains('add')) return;
      document.querySelectorAll('.wst').forEach(function(x){x.className='wst off';});
      this.className='wst on';
    });
  });
}

setTier('ag');
</script>
