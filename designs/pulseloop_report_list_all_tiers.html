
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --a:#5B5FC7;--al:#EEEEFF;--am:#A3A6E8;
  --bp:#F0F0F7;--bm:#F7F7FC;
  --tp:#1A1A3E;--ts:#6B6B8A;--tt:#A0A0BE;
  --br:#E4E4F0;--brs:#C5C5E0;
  --su:#4CAF82;--sub:#E8F7EF;
  --wa:#F5A623;--wab:#FFF4E0;
  --da:#E85757;--dab:#FDEAEA;
  --ag:#1A1A3E;--agb:#F5A623;
}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bp);}

/* TIER TABS */
.tier-row{display:flex;gap:3px;padding:3px;background:#fff;border:1px solid var(--br);border-radius:10px;width:fit-content;margin-bottom:12px;}
.tt{height:30px;padding:0 16px;border-radius:7px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--tt);}
.tt.ts{background:var(--bp);color:var(--tp);}
.tt.tp{background:var(--a);color:#fff;}
.tt.tag{background:var(--ag);color:var(--agb);}

/* SHELL */
.shell{display:flex;height:720px;background:var(--bp);border-radius:14px;overflow:hidden;border:1px solid var(--br);}

/* SIDEBAR */
.sidebar{width:215px;min-width:215px;background:#fff;border-right:1px solid var(--br);display:flex;flex-direction:column;flex-shrink:0;}
.sidebar.dark{background:var(--ag);border-color:#2D2D5E;}
.slogo{height:56px;display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0;}
.sidebar .slogo{border-bottom:1px solid var(--br);}
.sidebar.dark .slogo{border-bottom:1px solid #2D2D5E;}
.sli{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.slt{font-size:14px;font-weight:700;}
.sidebar .slt{color:var(--tp);}
.sidebar.dark .slt{color:#fff;}
.snav{padding:12px 8px 6px;}
.snl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:0 8px;margin-bottom:4px;color:var(--tt);}
.sidebar.dark .snl{color:rgba(255,255,255,.3);}
.sni{display:flex;align-items:center;gap:8px;height:38px;padding:0 10px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--ts);margin-bottom:1px;}
.sidebar.dark .sni{color:rgba(255,255,255,.45);}
.sni.act{background:var(--al);color:var(--a);}
.sidebar.dark .sni.act{background:rgba(245,166,35,.15);color:var(--agb);}
.sni svg{width:15px;height:15px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.sbot{margin-top:auto;padding:10px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.sidebar .sbot{border-top:1px solid var(--br);}
.sidebar.dark .sbot{border-top:1px solid #2D2D5E;}
.sav{width:28px;height:28px;border-radius:9999px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.spb{font-size:10px;font-weight:700;padding:1px 7px;border-radius:9999px;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.tb{height:56px;background:#fff;border-bottom:1px solid var(--br);display:flex;align-items:center;padding:0 20px;gap:8px;flex-shrink:0;}
.tb-title{font-size:16px;font-weight:600;color:var(--tp);flex:1;}
.sbox{display:flex;align-items:center;gap:6px;background:var(--bm);border:1px solid var(--br);border-radius:8px;padding:0 10px;height:30px;font-size:12px;color:var(--tt);flex-shrink:0;}
.sbox svg{width:12px;height:12px;stroke:var(--tt);fill:none;stroke-width:1.5;stroke-linecap:round;}
.tb-av{width:28px;height:28px;border-radius:9999px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.scroll{flex:1;overflow-y:auto;padding:18px 20px;background:var(--bm);}

/* BUTTONS */
.btnp{height:30px;padding:0 12px;border-radius:8px;color:#fff;font-size:12px;font-weight:600;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.btnp.ind{background:var(--a);}
.btnp.drk{background:var(--ag);}
.btnp.gr{background:var(--ts);}
.btns{height:30px;padding:0 10px;border-radius:8px;background:#fff;color:var(--tp);font-size:12px;font-weight:500;border:1px solid var(--br);cursor:pointer;display:inline-flex;align-items:center;gap:5px;}
.btng{height:26px;padding:0 8px;border-radius:6px;background:transparent;font-size:11px;font-weight:500;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:3px;}
.btng.p{color:var(--a);}
.btng.p:hover{background:var(--al);}
.btng.ag{color:#9A6600;}

.btn-up.p{background:var(--a);color:#fff;}
.btn-up.a{background:var(--ag);color:var(--agb);}

.bd{font-size:10px;font-weight:600;padding:2px 7px;border-radius:9999px;white-space:nowrap;}
.bd-new{background:var(--al);color:var(--a);}
.bd-hi{background:var(--sub);color:var(--su);}
.bd-med{background:var(--wab);color:var(--wa);}
.bd-lock{background:var(--bp);color:var(--ts);border:1px solid var(--br);}
.bd-da{background:var(--dab);color:var(--da);}
.bd-ag{background:rgba(245,166,35,.15);color:#9A6600;}

/* UPGRADE BANNER */
.ub{border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.ub.ind{background:var(--al);border:1px solid var(--am);}
.ub.drk{background:var(--ag);border:1px solid #3D3D7E;}
.ub-ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.ub.ind .ub-ic{background:var(--al);}
.ub.drk .ub-ic{background:rgba(245,166,35,.15);}
.ub-body{flex:1;min-width:0;}
.ub-ttl{font-size:12px;font-weight:700;}
.ub.ind .ub-ttl{color:var(--a);}
.ub.drk .ub-ttl{color:#fff;}
.ub-sub{font-size:11px;margin-top:1px;}
.ub.ind .ub-sub{color:var(--ts);}
.ub.drk .ub-sub{color:rgba(255,255,255,.55);}
.ub-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;}
.ut-i{font-size:10px;font-weight:600;padding:2px 6px;border-radius:9999px;background:var(--al);color:var(--a);}
.ut-d{font-size:10px;font-weight:600;padding:2px 6px;border-radius:9999px;background:rgba(245,166,35,.15);color:#9A6600;}

/* STATS GRID */
.sg{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:14px;}
.sc{background:#fff;border:1px solid var(--br);border-radius:10px;padding:11px 13px;}
.sc-l{font-size:10px;font-weight:600;color:var(--ts);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;}
.sc-v{font-size:19px;font-weight:700;color:var(--tp);}
.sc-s{font-size:10px;color:var(--tt);margin-top:1px;}

/* USAGE ROW */
.usage-row{background:#fff;border:1px solid var(--br);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.utrack{flex:0 0 140px;}
.ubar{height:5px;border-radius:9999px;background:var(--bp);overflow:hidden;margin-bottom:3px;}
.ufill{height:100%;border-radius:9999px;}
.ufill-s{background:var(--da);}
.ufill-p{background:var(--a);}
.ufill-ag{background:var(--agb);}
.ulbl{font-size:10px;text-align:right;}

/* RUN PANEL */
.run-panel{background:#fff;border:1px solid var(--br);border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.run-ic{width:32px;height:32px;border-radius:8px;background:var(--al);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.run-label{font-size:12px;font-weight:600;color:var(--tp);}
.run-sub{font-size:11px;color:var(--tt);margin-top:1px;}
.fsel{height:28px;padding:0 8px;border-radius:7px;border:1px solid var(--br);font-size:11px;color:var(--ts);background:#fff;font-family:inherit;cursor:pointer;outline:none;}

/* FILTER ROW */
.frow{display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.fc{height:26px;padding:0 10px;border-radius:9999px;font-size:11px;font-weight:600;cursor:pointer;border:none;}
.fc.on{background:var(--a);color:#fff;}
.fc.on-ag{background:var(--ag);color:#fff;}
.fc.off{background:#fff;color:var(--ts);border:1px solid var(--br);}

/* WORKSPACE TABS (Agency) */
.ws-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.wst{height:28px;padding:0 12px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:5px;}
.wst.on{background:var(--ag);color:#fff;}
.wst.off{background:#fff;color:var(--ts);border:1px solid var(--br);}
.wst.add{background:transparent;color:var(--ts);border:1px dashed var(--brs);}
.wct{font-size:10px;border-radius:9999px;padding:1px 5px;}
.wct-on{background:rgba(255,255,255,.2);color:#fff;}
.wct-off{background:var(--bm);color:var(--tt);}

/* MONTH GROUP */
.month-group{margin-bottom:18px;}
.month-lbl{font-size:11px;font-weight:700;color:var(--tt);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;padding-left:2px;}

/* REPORT CARD */
.rc-list{display:flex;flex-direction:column;gap:7px;}
.rc{background:#fff;border:1px solid var(--br);border-radius:12px;padding:13px 14px;cursor:pointer;transition:box-shadow .15s;display:flex;align-items:center;gap:11px;}
.rc:hover{box-shadow:0 4px 16px rgba(91,95,199,.10);}
.rc.fp{border-left:3px solid var(--a);}
.rc.fag{border-left:3px solid var(--agb);}
.rc.dim{opacity:.55;}
.rc-ic{width:36px;height:36px;border-radius:9px;background:var(--al);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.rc-ic.gold{background:rgba(245,166,35,.12);}
.rc-body{flex:1;min-width:0;}
.rc-niche{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px;}
.rc-niche.p{color:var(--a);}
.rc-niche.ag{color:#9A6600;}
.rc-title{font-size:13px;font-weight:600;color:var(--tp);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rc-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.rc-date{font-size:11px;color:var(--tt);}
.rc-right{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:5px;}
.rc-actions{display:flex;gap:2px;}

/* EMPTY SLOT CARD */
.empty-rc{background:var(--bm);border:1px dashed var(--brs);border-radius:12px;padding:13px 14px;display:flex;align-items:center;gap:10px;}
.empty-ic{width:36px;height:36px;border-radius:9px;background:#fff;border:1px solid var(--br);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.empty-ic svg{width:15px;height:15px;stroke:var(--tt);fill:none;stroke-width:1.5;stroke-linecap:round;}

/* LOCKED ARCHIVE CARD */
.lkc{background:var(--bm);border:2px dashed var(--brs);border-radius:12px;padding:13px 14px;display:flex;align-items:center;gap:10px;margin-top:4px;}
.lkc-ic{width:32px;height:32px;border-radius:8px;background:#fff;border:1px solid var(--br);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.lkc-ic svg{width:14px;height:14px;stroke:var(--tt);fill:none;stroke-width:1.5;stroke-linecap:round;}

/* PRIVATE UPLOAD */
.pvt-row{border:1.5px dashed var(--brs);border-radius:9px;padding:9px 12px;display:flex;align-items:center;gap:9px;cursor:pointer;background:#fff;margin-top:8px;}
.pvt-row:hover{border-color:var(--a);background:var(--al);}
</style>

var lkSvg = '<svg viewBox="0 0 24 24" style="width:11px;height:11px;stroke:var(--tt);fill:none;stroke-width:1.5;stroke-linecap:round;margin-left:auto;flex-shrink:0;"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>';

    sbPb.className='spb'; sbPb.style.cssText='background:var(--bp);color:var(--ts);border:1px solid var(--br);'; sbPb.textContent='STARTER';
    document.getElementById('sb-lt').style.color = 'var(--tp)';
    sbUn.style.color = 'var(--tp)';
    runBtn.className = 'btnp gr';
    niDb.style.opacity='0.35'; dbTxt.innerHTML='Dashboards '+lkSvg;
    niSb.style.opacity='0.35'; sbTxt.innerHTML='Signal Briefs '+lkSvg;
    niNl.style.opacity='0.35'; nlTxt.innerHTML='Newsletters '+lkSvg;
  }

  render();
}

function render() {
  var isS = T==='s', isP = T==='p', isAg = T==='ag';
  var nClr = isAg ? 'ag' : 'p';
  var icGold = isAg ? ' gold' : '';
  var featCls = isAg ? ' fag' : ' fp';
  var fcOn = isAg ? 'fc on-ag' : 'fc on';
  var ghCls = isAg ? ' ag' : ' p';
  var out = '';

  /* ── UPGRADE BANNER ── */
  if (isS) out += '<div class="ub ind"><div class="ub-ic">🚀</div><div class="ub-body"><div class="ub-ttl">Upgrade to Pro — unlock the full weekly loop</div><div class="ub-sub">Starter: 4 reports/mo, once a week, no dashboards, briefs or newsletters.</div><div class="ub-tags"><span class="ut-i">12 reports/mo</span><span class="ut-i">3× per week</span><span class="ut-i">2h-fresh signals</span><span class="ut-i">Visual dashboards</span><span class="ut-i">Signal Briefs</span><span class="ut-i">Newsletters</span></div></div><button class="btn-up p">Upgrade to Pro →</button></div>';
  if (isP) out += '<div class="ub drk"><div class="ub-ic">🏢</div><div class="ub-body"><div class="ub-ttl">Managing 3+ clients? Upgrade to Agency.</div><div class="ub-sub">Pro = 1 workspace. Agency = 5 workspaces, daily cadence, white-label output, Power BI export.</div><div class="ub-tags"><span class="ut-d">60 reports/mo total</span><span class="ut-d">Daily per workspace</span><span class="ut-d">1h-fresh signals</span><span class="ut-d">White-label</span><span class="ut-d">Power BI</span></div></div><button class="btn-up a">Upgrade to Agency →</button></div>';

  /* ── STATS ── */
  var cadence = isS ? 'Once / week' : isAg ? 'Daily' : '3× / week';
  var freshness = isS ? '≤ 6h old' : isAg ? '≤ 1h old' : '≤ 2h old';
  var usedN = isS ? 4 : 9;
  var totalN = isS ? 4 : 12;
  var usedColor = isS ? 'var(--da)' : 'var(--tp)';
  var fillCls = isS ? 'ufill-s' : isAg ? 'ufill-ag' : 'ufill-p';
  var fillPct = isS ? 100 : isAg ? 75 : 75;
  var usedLblColor = isS ? 'var(--da)' : isAg ? '#9A6600' : 'var(--ts)';
  var totalLabel = isAg ? '12/workspace · up to 60 total' : totalN + ' allowed';

  out += '<div class="sg">'
    + '<div class="sc"><div class="sc-l">Reports this month</div><div class="sc-v" style="color:'+usedColor+';">'+usedN+'</div><div class="sc-s">of '+totalLabel+'</div></div>'
    + '<div class="sc"><div class="sc-l">Cadence</div><div class="sc-v" style="font-size:14px;padding-top:4px;">'+cadence+'</div><div class="sc-s">on your plan</div></div>'
    + '<div class="sc"><div class="sc-l">Signal freshness</div><div class="sc-v" style="font-size:14px;padding-top:4px;">'+freshness+'</div><div class="sc-s">at report time</div></div>'
    + '<div class="sc"><div class="sc-l">Content generated</div><div class="sc-v">34</div><div class="sc-s">from these reports</div></div>'
    + '</div>';

  /* ── USAGE BAR ── */
  var usageText = isS
    ? '<span style="font-size:12px;font-weight:600;color:var(--da);">⚠ All 4 Starter slots used this month</span><div style="font-size:11px;color:var(--tt);margin-top:1px;">Resets in 8 days · Upgrade to Pro for 12/mo</div>'
    : isAg
    ? '<div style="font-size:12px;font-weight:600;color:var(--tp);">9 of 12 reports used — Acme Corp workspace</div><div style="font-size:11px;color:var(--tt);margin-top:1px;">3 remaining · resets in 8 days</div>'
    : '<div style="font-size:12px;font-weight:600;color:var(--tp);">9 of 12 reports used this month</div><div style="font-size:11px;color:var(--tt);margin-top:1px;">3 remaining · resets in 8 days</div>';

  out += '<div class="usage-row">'
    + '<div style="flex:1;">'+usageText+'</div>'
    + '<div class="utrack"><div class="ubar"><div class="'+fillCls+'" style="width:'+fillPct+'%;"></div></div><div class="ulbl" style="color:'+usedLblColor+';">'+usedN+' / '+(isAg?'12':totalN)+'</div></div>'
    + (isS ? '<button class="btn-up p">Upgrade →</button>' : '')
    + '</div>';

  /* ── AGENCY WORKSPACE TABS ── */
  if (isAg) {
    out += '<div style="font-size:10px;font-weight:700;color:var(--tt);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;">Workspace</div>'
      + '<div class="ws-tabs">'
      + '<button class="wst on">🏢 Acme Corp <span class="wct wct-on">9</span></button>'
      + '<button class="wst off">🚀 Mistral AI <span class="wct wct-off">12</span></button>'
      + '<button class="wst off">📊 Pennylane <span class="wct wct-off">5</span></button>'
      + '<button class="wst add">+ Add workspace</button>'
      + '</div>';
  }

  /* ── RUN PANEL ── */
  var wsSel = isAg ? '<select class="fsel" style="width:135px;"><option>🏢 Acme Corp</option><option>🚀 Mistral AI</option><option>📊 Pennylane</option></select>' : '';
  var runSub = isS
    ? '0 slots remaining this month — resets in 8 days'
    : isAg ? 'Daily cadence · 1h-fresh signals · custom signal types active'
    : '3 slots remaining · 2h-fresh signals from 18 EU sources';
  var runBtnCls = isAg ? 'btnp drk' : isS ? 'btnp gr' : 'btnp ind';
  var runDisabled = isS ? ' disabled style="opacity:.5;cursor:not-allowed;"' : '';

  out += '<div class="run-panel">'
    + '<div class="run-ic">⚡</div>'
    + '<div style="flex:1;"><div class="run-label">Run a new report</div><div class="run-sub">'+runSub+'</div></div>'
    + wsSel
    + '<select class="fsel" style="width:170px;"'+(isS?' disabled style="opacity:.5;"':'')+' ><option>🤖 AI Tooling for B2B SaaS</option><option>🇫🇷 French SaaS Funding</option><option>📋 EU Compliance & GDPR</option></select>'
    + '<button class="'+runBtnCls+'"'+runDisabled+'><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" style="width:11px;height:11px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Run report</button>'
    + (isS ? '' : '')
    + '</div>';

  /* private data upload for Agency */
  if (isAg) {
    out += '<div class="pvt-row"><svg viewBox="0 0 24 24" fill="none" stroke="var(--ts)" stroke-width="1.5" stroke-linecap="round" style="width:14px;height:14px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg><div><div style="font-size:12px;font-weight:600;color:var(--tp);">Upload private data into next report</div><div style="font-size:11px;color:var(--tt);">PDF, Excel, Word, TXT — injected into RAG context for this report run</div></div><span class="bd bd-ag" style="margin-left:auto;">Agency ✦</span></div>';
  }

  /* ── FILTER ROW ── */
  out += '<div class="frow" style="margin-top:14px;">'
    + '<button class="'+fcOn+'" id="fc-all">All niches</button>'
    + '<button class="fc off">🤖 AI Tooling</button>'
    + '<button class="fc off">🇫🇷 French SaaS</button>'
    + '<button class="fc off">📋 EU Compliance</button>'
    + '<div style="margin-left:auto;display:flex;gap:6px;">'
    + '<select class="fsel"><option>Newest first</option><option>Most signals</option><option>Oldest first</option></select>'
    + '<select class="fsel"><option>All months</option><option>March 2026</option><option>February 2026</option></select>'
    + '</div></div>';

  /* ── REPORT CARDS ── */
  /* Starter: show only 4 (this month's allocation), rest locked */
  /* Pro: show 6 grouped by month */
  /* Agency: show 9 grouped by month with workspace context */

  var visibleReports = isS ? REPORTS.slice(0,4) : REPORTS;

  /* March group */
  out += '<div class="month-group"><div class="month-lbl">March 2026</div><div class="rc-list">';
  var marchReports = visibleReports.filter(function(r){ return r.date.indexOf('Mar') > -1; });
  marchReports.forEach(function(r, i) {
    var feat = i===0 ? featCls : '';
    var strengthBadge = r.strength==='hi' ? '<span class="bd bd-hi">High signal</span>' : '<span class="bd bd-med">Medium signal</span>';
    var newBadge = r.tag ? '<span class="bd bd-new">'+r.tag+'</span>' : '';
    out += '<div class="rc'+feat+'">'
      + '<div class="rc-ic'+icGold+'">'+r.emoji+'</div>'
      + '<div class="rc-body">'
      + '<div class="rc-niche '+nClr+'">'+r.niche+'</div>'
      + '<div class="rc-title">'+r.week+' — '+r.title+'</div>'
      + '<div class="rc-meta"><span class="rc-date">'+r.date+'</span>'+newBadge+'<span class="bd '+(r.strength==='hi'?'bd-hi':'bd-med')+'">'+r.signals+' signals</span><span style="font-size:11px;color:var(--tt);">'+r.sources+' sources'+(isAg&&r.sources===18?' + custom':'')+' </span></div>'
      + '</div>'
      + '<div class="rc-right">'+strengthBadge+'<div class="rc-actions"><button class="btng'+ghCls+'">View →</button><button class="btng'+ghCls+'">PDF</button></div></div>'
      + '</div>';
  });
  out += '</div></div>';

  /* February group — Pro & Agency only */
  if (!isS) {
    out += '<div class="month-group"><div class="month-lbl">February 2026</div><div class="rc-list">';
    var febReports = visibleReports.filter(function(r){ return r.date.indexOf('Feb') > -1; });
    febReports.forEach(function(r) {
      var strengthBadge = r.strength==='hi' ? '<span class="bd bd-hi">High signal</span>' : '<span class="bd bd-med">Medium signal</span>';
      out += '<div class="rc">'
        + '<div class="rc-ic'+icGold+'">'+r.emoji+'</div>'
        + '<div class="rc-body">'
        + '<div class="rc-niche '+nClr+'">'+r.niche+'</div>'
        + '<div class="rc-title">'+r.week+' — '+r.title+'</div>'
        + '<div class="rc-meta"><span class="rc-date">'+r.date+'</span><span class="bd '+(r.strength==='hi'?'bd-hi':'bd-med')+'">'+r.signals+' signals</span><span style="font-size:11px;color:var(--tt);">'+r.sources+' sources</span></div>'
        + '</div>'
        + '<div class="rc-right">'+strengthBadge+'<div class="rc-actions"><button class="btng'+ghCls+'">View →</button><button class="btng'+ghCls+'">PDF</button></div></div>'
        + '</div>';
    });
    out += '</div></div>';
  }

  /* Starter: remaining slots as empty + locked archive */
  if (isS) {
    out += '<div class="empty-rc" style="margin-top:2px;">'
      + '<div class="empty-ic"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>'
      + '<div><div style="font-size:12px;font-weight:600;color:var(--tt);">0 slots remaining this month</div><div style="font-size:11px;color:var(--tt);margin-top:1px;">Your 4 Starter reports have been used · Resets in 8 days</div></div>'
      + '<button class="btn-up p" style="margin-left:auto;">Get more slots →</button>'
      + '</div>';

    out += '<div class="lkc" style="margin-top:8px;">'
      + '<div class="lkc-ic"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>'
      + '<div style="flex:1;"><div style="font-size:12px;font-weight:600;color:var(--ts);">9 older reports archived — February & earlier</div><div style="font-size:11px;color:var(--tt);margin-top:1px;">Starter keeps last 30 days only. Pro & Agency unlock full report history.</div></div>'
      + '<button class="btn-up p">Upgrade to access →</button>'
      + '</div>';
  }

  document.getElementById('list-body').innerHTML = out;

  /* filter chip interaction */
  document.querySelectorAll('.fc').forEach(function(b) {
    b.addEventListener('click', function() {
      document.querySelectorAll('.fc').forEach(function(x){ x.className='fc off'; });
      this.className = 'fc ' + (T==='ag' ? 'on-ag' : 'on');
    });
  });

  /* workspace tab interaction */
  document.querySelectorAll('.wst').forEach(function(b) {
    b.addEventListener('click', function() {
      if (this.classList.contains('add')) return;
      document.querySelectorAll('.wst').forEach(function(x){ x.className='wst off'; });
      this.className = 'wst on';
    });
  });
}

setTier('s');
</script>
