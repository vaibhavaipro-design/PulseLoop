
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --a:#5B5FC7;--al:#EEEEFF;--am:#A3A6E8;
  --bp:#F0F0F7;--bm:#F7F7FC;
  --tp:#1A1A3E;--ts:#6B6B8A;--tt:#A0A0BE;
  --br:#E4E4F0;--brs:#C5C5E0;
  --su:#4CAF82;--sub:#E8F7EF;
  --wa:#F5A623;--wab:#FFF4E0;
  --da:#E85757;--dab:#FDEAEA;
  --ag:#1A1A3E;--agb:#F5A623;
}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bp);}

/* TIER TABS */
.tier-row{display:flex;gap:3px;padding:3px;background:#fff;border:1px solid var(--br);border-radius:10px;width:fit-content;margin-bottom:12px;}
.tt{height:30px;padding:0 16px;border-radius:7px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--tt);}
.tt.ts{background:var(--bp);color:var(--tp);}
.tt.tp{background:var(--a);color:#fff;}
.tt.tag{background:var(--ag);color:var(--agb);}

/* SHELL */
.shell{display:flex;height:700px;background:var(--bp);border-radius:14px;overflow:hidden;border:1px solid var(--br);}

/* SIDEBAR */
.sidebar{width:215px;min-width:215px;background:#fff;border-right:1px solid var(--br);display:flex;flex-direction:column;flex-shrink:0;}
.sidebar.dark{background:var(--ag);border-color:#2D2D5E;}
.slogo{height:56px;display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0;}
.sidebar .slogo{border-bottom:1px solid var(--br);}
.sidebar.dark .slogo{border-color:#2D2D5E;}
.sidebar.dark .slogo{border-bottom:1px solid #2D2D5E;}
.sli{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.slt{font-size:14px;font-weight:700;}
.sidebar .slt{color:var(--tp);}
.sidebar.dark .slt{color:#fff;}
.snav{padding:12px 8px 6px;}
.snl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:0 8px;margin-bottom:4px;color:var(--tt);}
.sidebar.dark .snl{color:rgba(255,255,255,.3);}
.sni{display:flex;align-items:center;gap:8px;height:38px;padding:0 10px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--ts);margin-bottom:1px;}
.sidebar.dark .sni{color:rgba(255,255,255,.45);}
.sni.act{background:var(--al);color:var(--a);}
.sidebar.dark .sni.act{background:rgba(245,166,35,.15);color:var(--agb);}
.sni svg{width:15px;height:15px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.sbot{margin-top:auto;padding:10px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.sidebar .sbot{border-top:1px solid var(--br);}
.sidebar.dark .sbot{border-top:1px solid #2D2D5E;}
.sav{width:28px;height:28px;border-radius:9999px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.spb{font-size:10px;font-weight:700;padding:1px 7px;border-radius:9999px;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.tb{height:56px;background:#fff;border-bottom:1px solid var(--br);display:flex;align-items:center;padding:0 20px;gap:8px;flex-shrink:0;}
.tb-title{font-size:16px;font-weight:600;color:var(--tp);flex:1;}
.sbox{display:flex;align-items:center;gap:6px;background:var(--bm);border:1px solid var(--br);border-radius:8px;padding:0 10px;height:30px;font-size:12px;color:var(--tt);}
.sbox svg{width:12px;height:12px;stroke:var(--tt);fill:none;stroke-width:1.5;stroke-linecap:round;}
.scroll{flex:1;overflow-y:auto;padding:18px 20px;background:var(--bm);}

/* BUTTONS */
.btnp{height:30px;padding:0 12px;border-radius:8px;color:#fff;font-size:12px;font-weight:600;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.btnp.ind{background:var(--a);}
.btnp.drk{background:var(--ag);}
.btng{height:26px;padding:0 8px;border-radius:6px;background:transparent;font-size:11px;font-weight:500;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:3px;}
.btng.p{color:var(--a);}
.btng.p:hover{background:var(--al);}
.btng.ag{color:#9A6600;}
.btng.ag:hover{background:rgba(245,166,35,.08);}
.btn-up{height:24px;padding:0 11px;border-radius:9999px;font-size:11px;font-weight:600;border:none;cursor:pointer;white-space:nowrap;}
.btn-up.p{background:var(--a);color:#fff;}
.btn-up.a{background:var(--ag);color:var(--agb);}

/* BADGES */
.bd{font-size:10px;font-weight:600;padding:2px 7px;border-radius:9999px;white-space:nowrap;}
.bd-new{background:var(--al);color:var(--a);}
.bd-hi{background:var(--sub);color:var(--su);}
.bd-med{background:var(--wab);color:var(--wa);}
.bd-ag{background:rgba(245,166,35,.15);color:#9A6600;}

/* UPGRADE BANNER */
.ub{border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.ub.ind{background:var(--al);border:1px solid var(--am);}
.ub.drk{background:var(--ag);border:1px solid #3D3D7E;}
.ub-ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.ub.ind .ub-ic{background:#fff;}
.ub.drk .ub-ic{background:rgba(245,166,35,.15);}
.ub-body{flex:1;min-width:0;}
.ub-ttl{font-size:12px;font-weight:700;}
.ub.ind .ub-ttl{color:var(--a);}
.ub.drk .ub-ttl{color:#fff;}
.ub-sub{font-size:11px;margin-top:1px;}
.ub.ind .ub-sub{color:var(--ts);}
.ub.drk .ub-sub{color:rgba(255,255,255,.55);}
.ub-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;}
.ut-i{font-size:10px;font-weight:600;padding:2px 6px;border-radius:9999px;background:var(--al);color:var(--a);}
.ut-d{font-size:10px;font-weight:600;padding:2px 6px;border-radius:9999px;background:rgba(245,166,35,.15);color:#9A6600;}

/* STATS */
.sg{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:14px;}
.sc{background:#fff;border:1px solid var(--br);border-radius:10px;padding:11px 13px;}
.sc-l{font-size:10px;font-weight:600;color:var(--ts);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;}
.sc-v{font-size:19px;font-weight:700;color:var(--tp);}
.sc-s{font-size:10px;color:var(--tt);margin-top:1px;}

/* WORKSPACE TABS */
.ws-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.wst{height:28px;padding:0 12px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:5px;}
.wst.on{background:var(--ag);color:#fff;}
.wst.off{background:#fff;color:var(--ts);border:1px solid var(--br);}
.wst.add{background:transparent;color:var(--ts);border:1px dashed var(--brs);}
.wct{font-size:10px;border-radius:9999px;padding:1px 5px;}
.wct-on{background:rgba(255,255,255,.2);color:#fff;}
.wct-off{background:var(--bm);color:var(--tt);}

/* FILTER ROW */
.frow{display:flex;align-items:center;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.fc{height:26px;padding:0 10px;border-radius:9999px;font-size:11px;font-weight:600;cursor:pointer;border:none;}
.fc.on{background:var(--a);color:#fff;}
.fc.on-ag{background:var(--ag);color:#fff;}
.fc.off{background:#fff;color:var(--ts);border:1px solid var(--br);}
.fsel{height:28px;padding:0 8px;border-radius:7px;border:1px solid var(--br);font-size:11px;color:var(--ts);background:#fff;font-family:inherit;cursor:pointer;outline:none;}

/* DASHBOARD CARD GRID */
.db-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;}

/* DASHBOARD CARD */
.dbc{background:#fff;border:1px solid var(--br);border-radius:13px;overflow:hidden;cursor:pointer;transition:box-shadow .15s;display:flex;flex-direction:column;}
.dbc:hover{box-shadow:0 4px 16px rgba(91,95,199,.10);}
.dbc.feat{border-color:var(--am);}
.dbc.feat-ag{border-color:#F5D87A;}

/* CARD PREVIEW THUMBNAIL */
.dbc-thumb{height:100px;background:var(--bm);padding:10px 12px;display:flex;align-items:flex-end;gap:4px;position:relative;overflow:hidden;}
.dbc-thumb.gold{background:linear-gradient(135deg,#FFFBF0,#FFF3D0);}
.mini-bar{border-radius:2px 2px 0 0;flex-shrink:0;transition:opacity .15s;}
.dbc:hover .mini-bar{opacity:.8;}

/* CARD BODY */
.dbc-body{padding:12px 14px 8px;flex:1;}
.dbc-niche{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px;}
.dbc-niche.p{color:var(--a);}
.dbc-niche.ag{color:#9A6600;}
.dbc-title{font-size:13px;font-weight:600;color:var(--tp);margin-bottom:5px;line-height:1.35;}
.dbc-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.dbc-date{font-size:11px;color:var(--tt);}

/* CARD FOOTER */
.dbc-foot{display:flex;align-items:center;gap:4px;padding:8px 12px;border-top:1px solid var(--br);background:var(--bm);}
.dbc-views{font-size:10px;color:var(--tt);}

/* ADD CARD */
.add-card{border:2px dashed var(--brs);border-radius:13px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:28px 16px;min-height:240px;transition:all .15s;}
.add-card:hover{border-color:var(--a);background:var(--al);}
.add-card:hover .ac-ic{background:var(--a);}
.add-card:hover .ac-ic svg{stroke:#fff;}
.add-card:hover .ac-lbl{color:var(--a);}
.ac-ic{width:38px;height:38px;border-radius:10px;background:var(--bm);display:flex;align-items:center;justify-content:center;transition:all .15s;}
.ac-ic svg{width:16px;height:16px;stroke:var(--ts);fill:none;stroke-width:2;stroke-linecap:round;transition:all .15s;}
.ac-lbl{font-size:13px;font-weight:600;color:var(--ts);transition:all .15s;}
.ac-sub{font-size:11px;color:var(--tt);text-align:center;line-height:1.5;}

/* LOCKED PLACEHOLDER CARD */
.lock-card{border:2px dashed var(--brs);border-radius:13px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:28px 16px;min-height:240px;background:var(--bp);}
.lk-ic{width:38px;height:38px;border-radius:10px;background:#fff;border:1px solid var(--br);display:flex;align-items:center;justify-content:center;}
.lk-ic svg{width:16px;height:16px;stroke:var(--tt);fill:none;stroke-width:1.5;stroke-linecap:round;}
.lk-ttl{font-size:12px;font-weight:600;color:var(--ts);}
.lk-sub{font-size:11px;color:var(--tt);text-align:center;line-height:1.5;}

/* CREATE FROM REPORT MODAL-STYLE INLINE PANEL */
.from-report-panel{background:#fff;border:1px solid var(--br);border-radius:12px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;}
.frp-ic{width:34px;height:34px;border-radius:9px;background:var(--al);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.frp-body{flex:1;}
.frp-ttl{font-size:12px;font-weight:600;color:var(--tp);}
.frp-sub{font-size:11px;color:var(--tt);margin-top:1px;}
</style>

<script>
var T = 'p';
var lkSvg = '<svg viewBox="0 0 24 24" style="width:11px;height:11px;stroke:var(--tt);fill:none;stroke-width:1.5;stroke-linecap:round;margin-left:auto;flex-shrink:0;"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>';

var CARDS = [
  { emoji:'🤖', niche:'AI Tooling for B2B SaaS', title:'Week 12 — Mistral €600M & EU AI adoption surge', date:'24 Mar 2026', signals:847, strength:'hi', views:14, latest:true,  heights:[38,30,42,26,52,36,40,68] },
  { emoji:'🇫🇷', niche:'French SaaS Funding',    title:'Q1 2026 recap — €1.2B raised, 3 unicorn exits in sight', date:'17 Mar 2026', signals:312, strength:'med',views:8,  latest:false, heights:[30,28,34,38,42,24,30,44] },
  { emoji:'🤖', niche:'AI Tooling for B2B SaaS', title:'Week 10 — Claude 4 API release wave across French SaaS', date:'10 Mar 2026', signals:691, strength:'hi', views:11, latest:false, heights:[44,38,50,36,56,42,32,60] },
  { emoji:'📋', niche:'EU Compliance & GDPR',    title:'AI Act Aug 2026 enforcement — SaaS obligations mapped', date:'3 Mar 2026',  signals:204, strength:'med',views:6,  latest:false, heights:[22,18,28,20,24,32,18,26] },
];

function setTier(t) {
  T = t;
  var isS=t==='s', isAg=t==='ag';

  document.querySelectorAll('.tt').forEach(function(b){b.className='tt';});
  if(t==='s') document.querySelectorAll('.tt')[0].className='tt ts';
  if(t==='p') document.querySelectorAll('.tt')[1].className='tt tp';
  if(t==='ag') document.querySelectorAll('.tt')[2].className='tt tag';

  var sb=document.getElementById('sb');
  var sbLi=document.getElementById('sb-li');
  var sbAv=document.getElementById('sb-av');
  var topAv=document.getElementById('top-av');
  var sbPb=document.getElementById('sb-pb');
  var sbLt=document.getElementById('sb-lt');
  var sbUn=document.getElementById('sb-un');
  var newBtn=document.getElementById('new-btn');
  var niDb=document.getElementById('ni-db');
  var niSb=document.getElementById('ni-sb');
  var niNl=document.getElementById('ni-nl');
  var sbTxt=document.getElementById('sb-txt');
  var nlTxt=document.getElementById('nl-txt');

  if (isAg) {
    sb.className='sidebar dark';
    sbLi.style.background='var(--agb)';
    sbAv.style.background='rgba(245,166,35,.2)'; sbAv.style.color='var(--agb)';
    topAv.style.background='rgba(245,166,35,.2)'; topAv.style.color='var(--agb)';
    sbPb.style.cssText='background:var(--ag);color:var(--agb);'; sbPb.textContent='AGENCY';
    sbLt.style.color='#fff'; sbUn.style.color='#fff';
    niDb.className='sni act'; niDb.style.background='rgba(245,166,35,.15)'; niDb.style.color='var(--agb)';
    newBtn.className='btnp drk';
    niSb.style.opacity='1'; sbTxt.textContent='Signal Briefs';
    niNl.style.opacity='1'; nlTxt.textContent='Newsletters';
  } else if (isS) {
    sb.className='sidebar';
    sbLi.style.background='var(--a)';
    sbAv.style.background='var(--al)'; sbAv.style.color='var(--a)';
    topAv.style.background='var(--al)'; topAv.style.color='var(--a)';
    sbPb.style.cssText='background:var(--bp);color:var(--ts);border:1px solid var(--br);'; sbPb.textContent='STARTER';
    sbLt.style.color='var(--tp)'; sbUn.style.color='var(--tp)';
    niDb.className='sni act'; niDb.style.background=''; niDb.style.color='';
    newBtn.className='btnp ind'; newBtn.style.opacity='0.4'; newBtn.setAttribute('disabled','');
    niSb.style.opacity='0.35'; sbTxt.innerHTML='Signal Briefs '+lkSvg;
    niNl.style.opacity='0.35'; nlTxt.innerHTML='Newsletters '+lkSvg;
  } else {
    sb.className='sidebar';
    sbLi.style.background='var(--a)';
    sbAv.style.background='var(--al)'; sbAv.style.color='var(--a)';
    topAv.style.background='var(--al)'; topAv.style.color='var(--a)';
    sbPb.style.cssText='background:var(--al);color:var(--a);'; sbPb.textContent='PRO';
    sbLt.style.color='var(--tp)'; sbUn.style.color='var(--tp)';
    niDb.className='sni act'; niDb.style.background=''; niDb.style.color='';
    newBtn.className='btnp ind'; newBtn.style.opacity='1'; newBtn.removeAttribute('disabled');
    niSb.style.opacity='1'; sbTxt.textContent='Signal Briefs';
    niNl.style.opacity='1'; nlTxt.textContent='Newsletters';
  }

  render();
}

function mkMiniBar(h, isHi, isAg) {
  var color = isHi ? (isAg ? 'var(--agb)' : 'var(--a)') : (isAg ? 'rgba(245,166,35,.3)' : 'var(--am)');
  return '<div class="mini-bar" style="height:'+h+'px;width:11px;background:'+color+';"></div>';
}

function render() {
  var isS=T==='s', isAg=T==='ag';
  var nClr=isAg?'ag':'p';
  var ghCls=isAg?' ag':' p';
  var fcOn=isAg?'fc on-ag':'fc on';
  var out='';

  /* ── UPGRADE BANNERS ── */
  if (isS) {
    out += '<div class="ub ind">'
      +'<div class="ub-ic">📊</div>'
      +'<div class="ub-body">'
      +'<div class="ub-ttl">Dashboards are a Pro & Agency feature</div>'
      +'<div class="ub-sub">Generate visual charts and shareable summaries directly from any Trend Report. Starter doesn\'t include dashboards.</div>'
      +'<div class="ub-tags"><span class="ut-i">12 dashboards/mo on Pro</span><span class="ut-i">Unlimited on Agency</span><span class="ut-i">White-label on Agency</span><span class="ut-i">Power BI on Agency</span></div>'
      +'</div>'
      +'<button class="btn-up p">Upgrade to Pro →</button>'
      +'</div>';
  }
  if (isAg) {
    /* no banner — Agency is the top tier, show a plan health row instead */
  }
  if (!isS && !isAg) {
    out += '<div class="ub drk">'
      +'<div class="ub-ic">🏢</div>'
      +'<div class="ub-body">'
      +'<div class="ub-ttl">Need unlimited dashboards + Power BI? Upgrade to Agency.</div>'
      +'<div class="ub-sub">Pro gives 12 dashboards/mo. Agency removes the cap and adds white-label delivery and Power BI export for client reporting.</div>'
      +'<div class="ub-tags"><span class="ut-d">Unlimited dashboards</span><span class="ut-d">Power BI export</span><span class="ut-d">White-label output</span><span class="ut-d">Per-workspace brand voice</span></div>'
      +'</div>'
      +'<button class="btn-up a">Upgrade to Agency →</button>'
      +'</div>';
  }

  /* ── STATS ROW ── */
  var totalDbs = isS?0:isAg?11:5;
  var usedThis = isS?0:isAg?11:5;
  var allowedLabel = isS?'Locked':isAg?'Unlimited':'12/mo';
  var pbiLabel = isAg?'Ready':'Locked';
  var wlLabel = isAg?'Active':'Locked';
  out += '<div class="sg">'
    +'<div class="sc"><div class="sc-l">Total dashboards</div><div class="sc-v" style="color:'+(isS?'var(--da)':'var(--tp)')+';">'+totalDbs+'</div><div class="sc-s">'+allowedLabel+'</div></div>'
    +'<div class="sc"><div class="sc-l">Generated this month</div><div class="sc-v" style="color:'+(isS?'var(--da)':'var(--tp)')+';">'+usedThis+'</div><div class="sc-s">'+(isS?'Locked':isAg?'Unlimited (Agency)':'of 12 allowed')+'</div></div>'
    +'<div class="sc"><div class="sc-l">White-label</div><div class="sc-v" style="font-size:14px;padding-top:4px;">'+wlLabel+'</div><div class="sc-s">'+(isAg?'Client-branded':'Agency only')+'</div></div>'
    +'<div class="sc"><div class="sc-l">Power BI export</div><div class="sc-v" style="font-size:14px;padding-top:4px;">'+pbiLabel+'</div><div class="sc-s">'+(isAg?'Export from any dashboard':'Agency only')+'</div></div>'
    +'</div>';

  /* ── AGENCY WORKSPACE TABS ── */
  if (isAg) {
    out += '<div style="font-size:10px;font-weight:700;color:var(--tt);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;">Workspace</div>'
      +'<div class="ws-tabs">'
      +'<button class="wst on">🏢 Acme Corp <span class="wct wct-on">5</span></button>'
      +'<button class="wst off">🚀 Mistral AI <span class="wct wct-off">4</span></button>'
      +'<button class="wst off">📊 Pennylane <span class="wct wct-off">2</span></button>'
      +'<button class="wst add">+ Add workspace</button>'
      +'</div>';
  }

  /* ── CREATE FROM REPORT PANEL — Pro & Agency ── */
  if (!isS) {
    var wsSel = isAg ? '<select style="height:28px;padding:0 8px;border-radius:7px;border:1px solid var(--br);font-size:11px;color:var(--ts);background:#fff;font-family:inherit;cursor:pointer;outline:none;"><option>🏢 Acme Corp</option><option>🚀 Mistral AI</option></select>' : '';
    out += '<div class="from-report-panel">'
      +'<div class="frp-ic">⚡</div>'
      +'<div class="frp-body">'
      +'<div class="frp-ttl">Generate a dashboard from a Trend Report</div>'
      +'<div class="frp-sub">Pick any report — PulseLoop builds the visual summary automatically in your brand colours</div>'
      +'</div>'
      +wsSel
      +'<select style="height:28px;padding:0 8px;border-radius:7px;border:1px solid var(--br);font-size:11px;color:var(--ts);background:#fff;font-family:inherit;cursor:pointer;outline:none;width:175px;"><option>🤖 AI Tooling — Week 12</option><option>🇫🇷 French SaaS — Week 11</option><option>🤖 AI Tooling — Week 10</option></select>'
      +'<button class="btnp '+(isAg?'drk':'ind')+'">Generate →</button>'
      +'</div>';
  }

  /* ── FILTER ROW — Pro & Agency ── */
  if (!isS) {
    out += '<div class="frow">'
      +'<button class="'+fcOn+'">All niches</button>'
      +'<button class="fc off">🤖 AI Tooling</button>'
      +'<button class="fc off">🇫🇷 French SaaS</button>'
      +'<button class="fc off">📋 EU Compliance</button>'
      +'<div style="margin-left:auto;"><select class="fsel"><option>Newest first</option><option>Most viewed</option></select></div>'
      +'</div>';
  }

  /* ── CARD GRID ── */
  out += '<div class="db-grid">';

  if (isS) {
    /* Two locked placeholder cards */
    out += '<div class="lock-card">'
      +'<div class="lk-ic"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>'
      +'<div class="lk-ttl">Dashboards locked on Starter</div>'
      +'<div class="lk-sub">Visual charts and shareable<br>summaries from your reports.<br>Available on Pro & Agency.</div>'
      +'<button class="btn-up p" style="margin-top:2px;">Upgrade to Pro →</button>'
      +'</div>'
      +'<div class="lock-card">'
      +'<div class="lk-ic"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>'
      +'<div class="lk-ttl">Power BI export — Agency only</div>'
      +'<div class="lk-sub">Send any dashboard\'s data<br>directly to your Power BI<br>workspace for client reporting.</div>'
      +'<button class="btn-up a" style="margin-top:2px;">Upgrade to Agency →</button>'
      +'</div>';
  } else {
    /* Real dashboard cards */
    CARDS.forEach(function(c, i) {
      var feat = i===0 ? (isAg?' feat-ag':' feat') : '';
      var maxH = Math.max.apply(null, c.heights);
      var miniBars = c.heights.map(function(h,j){
        return mkMiniBar(Math.round(h/maxH*60), j===7, isAg);
      }).join('');
      var thumbCls = isAg ? ' gold' : '';

      out += '<div class="dbc'+feat+'">'
        +'<div class="dbc-thumb'+thumbCls+'">'+miniBars+'</div>'
        +'<div class="dbc-body">'
        +'<div class="dbc-niche '+nClr+'">'+c.niche+'</div>'
        +'<div class="dbc-title">'+c.title+'</div>'
        +'<div class="dbc-meta">'
        +'<span class="dbc-date">'+c.date+'</span>'
        +(c.latest ? '<span class="bd bd-new">Latest</span>' : '')
        +'<span class="bd '+(c.strength==='hi'?'bd-hi':'bd-med')+'">'+c.signals+' signals</span>'
        +(isAg ? '<span class="bd bd-ag">✦ White-label</span>' : '')
        +'</div>'
        +'</div>'
        +'<div class="dbc-foot">'
        +'<span class="dbc-views">👁 '+c.views+' views</span>'
        +'<div style="margin-left:auto;display:flex;gap:3px;">'
        +'<button class="btng'+ghCls+'">View →</button>'
        +(isAg ? '<button class="btng ag">Power BI</button>' : '')
        +'<button class="btng'+ghCls+'">PDF</button>'
        +'<button class="btng'+ghCls+'" style="color:var(--da);">Delete</button>'
        +'</div>'
        +'</div>'
        +'</div>';
    });

    /* Add card */
    out += '<div class="add-card">'
      +'<div class="ac-ic"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>'
      +'<div class="ac-lbl">Create new dashboard</div>'
      +'<div class="ac-sub">Pick any Trend Report and<br>PulseLoop builds the visual<br>summary automatically</div>'
      +'</div>';
  }

  out += '</div>';
  document.getElementById('page-body').innerHTML = out;

  /* interactions */
  document.querySelectorAll('.fc').forEach(function(b){
    b.addEventListener('click',function(){
      document.querySelectorAll('.fc').forEach(function(x){x.className='fc off';});
      this.className='fc '+(T==='ag'?'on-ag':'on');
    });
  });
  document.querySelectorAll('.wst').forEach(function(b){
    b.addEventListener('click',function(){
      if(this.classList.contains('add')) return;
      document.querySelectorAll('.wst').forEach(function(x){x.className='wst off';});
      this.className='wst on';
    });
  });
}

setTier('p');
</script>
