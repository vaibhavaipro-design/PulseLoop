
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{

.sc{background:#fff;border:1px solid var(--br);border-radius:10px;padding:11px 13px;}

.ws-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.wst{height:28px;padding:0 12px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:5px;}

.frow{display:flex;align-items:center;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.fc{height:26px;padding:0 10px;border-radius:9999px;font-size:11px;font-weight:600;cursor:pointer;border:none;}
.fc.on{background:var(--a);color:#fff;}
.fc.on-ag{background:var(--ag);color:#fff;}
.fc.off{background:#fff;color:var(--ts);border:1px solid var(--br);}

/* POST SET CARD — the container for one generation (3 variants) */
.psc{background:#fff;border:1px solid var(--br);border-radius:13px;overflow:hidden;margin-bottom:12px;}
.psc.feat-p{border-left:3px solid var(--a);}
.psc.feat-ag{border-left:3px solid var(--agb);}
.psc-header{padding:12px 14px 10px;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:8px;}
.psc-emoji{font-size:16px;flex-shrink:0;}
.psc-niche{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;}
.psc-niche.p{color:var(--a);}
.psc-niche.ag{color:#9A6600;}
.psc-title{font-size:13px;font-weight:600;color:var(--tp);flex:1;}
.psc-right{display:flex;align-items:center;gap:5px;flex-shrink:0;}

/* 3-VARIANT GRID inside each set */
.variants-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:0;border-top:1px solid var(--br);}
.variant{padding:12px 14px;border-right:1px solid var(--br);}
.variant:last-child{border-right:none;}
.v-type-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.v-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;}
.v-type.hook{color:var(--a);}
.v-type.insight{color:var(--su);}
.v-type.cta{color:var(--wa);}
.v-type.ag-hook{color:#9A6600;}
.v-type.ag-insight{color:var(--su);}
.v-type.ag-cta{color:var(--wa);}

/* The actual post text — looks like a LinkedIn post */
.post-text{font-size:12px;color:var(--tp);line-height:1.7;margin-bottom:10px;}
.post-text .post-hook{font-weight:700;display:block;margin-bottom:4px;}
.post-text .post-hashtags{color:var(--li);font-size:11px;margin-top:6px;line-height:1.8;}
.post-cite{font-size:10px;color:var(--tt);margin-bottom:8px;}
.post-cite span{color:var(--a);font-weight:600;}

/* VARIANTS FOOTER */
.psc-foot{display:flex;align-items:center;gap:5px;padding:8px 12px;border-top:1px solid var(--br);background:var(--bm);}

/* COMING SOON PILL */
.cs-pill{display:inline-flex;align-items:center;gap:4px;background:#F0FDF4;color:#166534;border:1px solid #BBF7D0;border-radius:9999px;font-size:10px;font-weight:600;padding:2px 8px;}

/* LOCKED */
.lock-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:50px 20px;text-align:center;}
.lock-icon-bg{width:56px;height:56px;border-radius:16px;background:var(--dab);display:flex;align-items:center;justify-content:center;}
.lock-icon-bg svg{width:24px;height:24px;stroke:var(--da);fill:none;stroke-width:1.5;stroke-linecap:round;}
.lock-feats{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:420px;width:100%;}
.lf{background:#fff;border:1px solid var(--br);border-radius:9px;padding:10px 12px;display:flex;gap:8px;align-items:flex-start;text-align:left;}
.lf svg{width:13px;height:13px;stroke:var(--a);fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0;margin-top:2px;}
.lf-ttl{font-size:12px;font-weight:600;color:var(--tp);}
.lf-sub{font-size:11px;color:var(--tt);margin-top:1px;}

.pg{display:none;flex-direction:column;overflow:hidden;flex:1;}
.pg.on{display:flex;}
</style>

<script>

var lkSvg = '<svg viewBox="0 0 24 24" style="width:11px;height:11px;stroke:var(--tt);fill:none;stroke-width:1.5;stroke-linecap:round;margin-left:auto;flex-shrink:0;"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>';

var POST_SETS = [

  } else if (isS) {
    sb.className='sidebar'; sbLi.style.background='var(--a)';
    sbAv.style.background='var(--al)'; sbAv.style.color='var(--a)';
    topAv.style.background='var(--al)'; topAv.style.color='var(--a)';
    sbPb.style.cssText='background:var(--bp);color:var(--ts);border:1px solid var(--br);'; sbPb.textContent='STARTER';
    sbLt.style.color='var(--tp)'; sbUn.style.color='var(--tp)';
    newBtn.className='btnp li';
    niLi.className='sni act'; niLi.style.background=''; niLi.style.color='';
  } else {
    sb.className='sidebar'; sbLi.style.background='var(--a)';
    sbAv.style.background='var(--al)'; sbAv.style.color='var(--a)';
    topAv.style.background='var(--al)'; topAv.style.color='var(--a)';
    sbPb.style.cssText='background:var(--al);color:var(--a);'; sbPb.textContent='PRO';
    sbLt.style.color='var(--tp)'; sbUn.style.color='var(--tp)';
    newBtn.className='btnp li';
    niLi.className='sni act'; niLi.style.background=''; niLi.style.color='';
  }
  render();
}

function render() {
  var isS=T==='s', isAg=T==='ag';
  var nClr=isAg?'ag':'p', ghCls=isAg?' ag':' p', fcOn=isAg?'fc on-ag':'fc on';
  var copyCls=isAg?'ag':'';
  var typeHook=isAg?'ag-hook':'hook', typeInsight=isAg?'ag-insight':'insight', typeCta=isAg?'ag-cta':'cta';
  var out='';

  /* ── STARTER: LinkedIn is included but from Trend Reports only ── */
  if (isS) {
    out += '<div class="ub ind"><div class="ub-ic">💼</div><div class="ub-body"><div class="ub-ttl">LinkedIn Posts included on Starter — from Trend Reports only</div><div class="ub-sub">You get 3 copy-paste ready post variants per Trend Report — up to 4 sets/month. Upgrade to Pro to also generate from Signal Briefs and Newsletters, and get up to 12 sets/month.</div><div class="ub-tags"><span class="ut-i">3 variants per set</span><span class="ut-i">From Trend Reports only</span><span class="ut-i">Up to 4 sets/mo</span><span class="ut-i">Pro: briefs + newsletters too</span></div></div><button class="btn-up p">Upgrade to Pro →</button></div>';
  }
  if (isAg) {
    out += '<div class="ub drk"><div class="ub-ic">🏢</div><div class="ub-body"><div class="ub-ttl">Agency — white-label posts, custom signals, private data reflected</div><div class="ub-sub">Posts are attributed to your client\'s brand voice per workspace. Custom signal types and uploaded private data are woven into post content. Up to 60 sets/month across 5 workspaces.</div><div class="ub-tags"><span class="ut-d">White-label per workspace</span><span class="ut-d">Custom signals in posts</span><span class="ut-d">Private data reflected</span><span class="ut-d">Up to 60 sets/mo total</span></div></div></div>';
  }
  if (!isS && !isAg) {
    out += '<div class="ub drk"><div class="ub-ic">🏢</div><div class="ub-body"><div class="ub-ttl">Upgrade to Agency for white-label posts and custom signal types.</div><div class="ub-sub">Pro posts carry your brand voice. Agency lets you write posts attributed to each client workspace — custom signals and private data woven in.</div><div class="ub-tags"><span class="ut-d">White-label per workspace</span><span class="ut-d">Custom signal types</span><span class="ut-d">Private data in posts</span><span class="ut-d">Up to 60 sets/mo total</span></div></div><button class="btn-up a">Upgrade to Agency →</button></div>';
  }

  /* STATS */
  var setsUsed = isS?3:isAg?11:9;
  var setsAllowed = isS?'4/mo (report cadence)':isAg?'12/workspace · 60 total':'12/mo';
  var sources = isAg?'18 + custom':'18 EU sources';
  var wlVal = isAg?'Active':'Locked';
  out += '<div class="sg">'
    +'<div class="sc"><div class="sc-l">Sets generated</div><div class="sc-v">'+setsUsed+'</div><div class="sc-s">'+setsAllowed+'</div></div>'
    +'<div class="sc"><div class="sc-l">Variants/set</div><div class="sc-v">3</div><div class="sc-s">Hook · Insight · CTA</div></div>'
    +'<div class="sc"><div class="sc-l">Sources</div><div class="sc-v" style="font-size:13px;padding-top:4px;">'+sources+'</div><div class="sc-s">90-day RAG memory</div></div>'
    +'<div class="sc"><div class="sc-l">White-label</div><div class="sc-v" style="font-size:14px;padding-top:4px;">'+wlVal+'</div><div class="sc-s">'+(isAg?'Client brand voice':'Agency only')+'</div></div>'
    +'</div>';

  /* AGENCY WORKSPACE TABS */
  if (isAg) {
    out += '<div style="font-size:10px;font-weight:700;color:var(--tt);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;">Workspace</div>'
      +'<div class="ws-tabs"><button class="wst on">🏢 Acme Corp <span class="wct wct-on">11</span></button><button class="wst off">🚀 Mistral AI <span class="wct wct-off">12</span></button><button class="wst off">📊 Pennylane <span class="wct wct-off">6</span></button><button class="wst add">+ Add workspace</button></div>';
  }

  /* GEN PANEL */
  var srcOpts = '';
  if (isS) {
    srcOpts = '<div class="src-toggle">'
      +'<button class="src-opt on">📊 Trend Report</button>'
      +'<button class="src-opt dis" title="Upgrade to Pro">📋 Signal Brief</button>'
      +'<button class="src-opt dis" title="Upgrade to Pro">📧 Newsletter</button>'
      +'</div>';
  } else {
    var onCls = 'src-opt on'+(isAg?'-ag':'');
    srcOpts = '<div class="src-toggle" id="src-toggle">'
      +'<button class="src-opt '+onCls.replace('src-opt ','')+'" data-src="report">📊 Trend Report</button>'
      +'<button class="src-opt" data-src="brief">📋 Signal Brief</button>'
      +'<button class="src-opt" data-src="nl">📧 Newsletter</button>'
      +'</div>';
  }
  var wsSel = isAg ? '<select class="fsel" style="width:125px;"><option>🏢 Acme Corp</option><option>🚀 Mistral AI</option></select>' : '';
  var csNote = isS ? '' : '<span class="cs-pill">🗓 Direct scheduling — coming soon</span>';

  out += '<div class="gen-panel">'
    +'<div class="gen-top">'
    +'<div style="width:32px;height:32px;border-radius:8px;background:'+(isAg?'rgba(245,166,35,.15)':'var(--li-l)')+';display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;">💼</div>'
    +'<div style="flex:1;"><div style="font-size:12px;font-weight:600;color:var(--tp);">Generate 3 LinkedIn post variants</div>'
    +'<div style="font-size:11px;color:var(--tt);margin-top:1px;">Hook · Insight · CTA — all in your brand voice · copy-paste ready · cited sources'+(isAg?' · white-label · custom signals · private data':'')+'</div></div>'
    +(isAg?'<span class="bd bd-ag">✦ White-label</span>':'')
    +'</div>'
    +'<div class="gen-inputs">'
    +'<span style="font-size:11px;color:var(--tt);font-weight:500;flex-shrink:0;">From:</span>'
    +srcOpts+wsSel
    +'<select class="fsel" style="flex:1;min-width:150px;">'+(isS?'<option>🤖 AI Tooling — Report W12</option><option>🇫🇷 French SaaS — Report W11</option>':'<option>🤖 AI Tooling — Report W12</option><option>📋 AI Tooling Brief W12</option><option>🇫🇷 French SaaS — Report W11</option><option>📧 AI Tooling Newsletter W12</option>')+'</select>'
    +'<button class="btnp '+(isAg?'drk':'li')+'">Generate →</button>'
    +(csNote?'<div style="width:100%;display:flex;align-items:center;gap:6px;padding-top:4px;">'+csNote+'<span style="font-size:11px;color:var(--tt);">Posts are copy-paste ready — direct LinkedIn scheduling is planned for a future release</span></div>':'')
    +'</div></div>';

  /* FILTER */
  out += '<div class="frow">'
    +'<button class="'+fcOn+'">All sources</button>'
    +'<button class="fc off">📊 From Reports</button>'
    +(isS?'':('<button class="fc off">📋 From Briefs</button><button class="fc off">📧 From Newsletters</button>'))
    +'<button class="fc off">🤖 AI Tooling</button>'
    +'<button class="fc off">🇫🇷 French SaaS</button>'
    +'<div style="margin-left:auto;"><select class="fsel"><option>Newest first</option><option>Most copied</option></select></div>'
    +'</div>';

  /* POST SET CARDS */
  POST_SETS.forEach(function(set, si) {
    var feat = si===0?(isAg?' feat-ag':' feat-p'):'';
    out += '<div class="psc'+feat+'">';

    /* HEADER */
    out += '<div class="psc-header">'
      +'<span class="psc-emoji">'+set.emoji+'</span>'
      +'<div style="flex:1;min-width:0;">'
      +'<div class="psc-niche '+nClr+'">'+set.niche+' · from '+set.source+'</div>'
      +'<div class="psc-title">'+set.title+'</div>'
      +'</div>'
      +'<div class="psc-right">'
      +(set.latest?'<span class="bd bd-new">Latest</span>':'')
      +'<span class="bd '+(set.strength==='hi'?'bd-hi':'bd-med')+'">'+(set.strength==='hi'?'High signal':'Medium')+'</span>'
      +(isAg?'<span class="bd bd-ag">✦ White-label</span>':'')
      +'<span style="font-size:10px;color:var(--tt);">'+set.date+'</span>'
      +'</div>'
      +'</div>';

    /* 3 VARIANTS */
    out += '<div class="variants-grid">';
    var types=[{lbl:'Hook',cls:typeHook},{lbl:'Insight',cls:typeInsight},{lbl:'CTA',cls:typeCta}];
    set.posts.forEach(function(p, pi) {
      var lines = p.text.split('\n').map(function(l,i){
        if(i===0) return '<span class="post-hook">'+l+'</span>';
        return l===''?'<br>':l+'<br>';
      }).join('');
      out += '<div class="variant">'
        +'<div class="v-type-row">'
        +'<span class="v-type '+types[pi].cls+'">'+types[pi].lbl+'</span>'
        +'<button class="btn-copy '+copyCls+'">'
        +'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:10px;height:10px;"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>'
        +'Copy'
        +'</button>'
        +'</div>'
        +'<div class="post-text">'+lines+'<div class="post-hashtags">'+p.hashtags+'</div></div>'
        +'<div class="post-cite">Source: <span>'+set.source+'</span>'+(isAg?' · private data woven in ✦':'')+'</div>'
        +'</div>';
    });
    out += '</div>';

    /* SET FOOTER */
    out += '<div class="psc-foot">'
      +'<span style="font-size:10px;color:var(--tt);">3 variants · copy-paste ready</span>'
      +'<div style="margin-left:auto;display:flex;gap:4px;">'
      +'<button class="btn-copy '+copyCls+'" style="height:24px;font-size:10px;gap:3px;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:9px;height:9px;"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy all 3</button>'
      +(isAg?'<button class="btng ag">🎨 White-label voice</button>':'')
      +'<button class="btng'+ghCls+'">Regenerate</button>'
      +'</div>'
      +'</div>';

    out += '</div>';
  });

  document.getElementById('main-body').innerHTML = out;
  document.querySelectorAll('.fc').forEach(function(b){b.addEventListener('click',function(){document.querySelectorAll('.fc').forEach(function(x){x.className='fc off';});this.className='fc '+(T==='ag'?'on-ag':'on');});});
  document.querySelectorAll('.wst').forEach(function(b){b.addEventListener('click',function(){if(this.classList.contains('add'))return;document.querySelectorAll('.wst').forEach(function(x){x.className='wst off';});this.className='wst on';});});
  var tgl=document.getElementById('src-toggle');
  if(tgl){
    tgl.querySelectorAll('.src-opt').forEach(function(b){
      b.addEventListener('click',function(){
        if(this.classList.contains('dis'))return;
        var onCls='src-opt on'+(T==='ag'?'-ag':'');
        tgl.querySelectorAll('.src-opt').forEach(function(x){x.className='src-opt';});
        this.className=onCls;
      });
    });
  }
}

setTier('p');
</script>
